<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTIPLAN — Demand Governance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F0F4F8;color:#1E293B;font-size:14px}
button{cursor:pointer;font-family:inherit;transition:all .15s}
input,select,textarea{font-family:inherit}

/* LOGIN */
.login-page{min-height:100vh;background:linear-gradient(135deg,#0B1F3A 0%,#1A4A8A 100%);display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:20px;padding:40px;width:400px;box-shadow:0 24px 80px #0006}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-text{font-size:32px;font-weight:900;color:#0B1F3A;letter-spacing:-1px}
.login-logo-accent{color:#00A8E8;font-weight:300;letter-spacing:3px}
.login-tagline{font-size:12px;color:#64748B;margin-top:6px;letter-spacing:.5px}
.login-input{width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:13px;outline:none;transition:border .15s;margin-bottom:12px}
.login-input:focus{border-color:#00A8E8}
.login-btn{width:100%;padding:12px;background:#0B1F3A;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px}
.login-btn:hover{background:#1A4A8A}
.login-hint{font-size:11px;color:#94A3B8;text-align:center;margin-top:14px}

/* LAYOUT */
.topbar{background:#0B1F3A;height:52px;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px #0006}
.logo-text{font-size:18px;font-weight:900;color:#fff;letter-spacing:-0.5px}
.logo-accent{font-weight:300;color:#00A8E8;letter-spacing:2px}
.topbar-sep{width:1px;height:24px;background:#ffffff22}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.topbar-btn{background:#1e3a5f;border:none;color:#94a3b8;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.topbar-btn:hover{background:#2a4a6f;color:#fff}
.topbar-btn.active{background:#00A8E833;color:#00A8E8}
.avatar{width:32px;height:32px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:11px;font-weight:700;cursor:pointer}

/* STEPS */
.steps-bar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 20px;display:flex;align-items:center;overflow-x:auto}
.step-item{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;color:#64748B;font-size:12px;font-weight:500;transition:all .15s}
.step-item.active{border-bottom-color:#00A8E8;color:#0B1F3A;font-weight:700}
.step-item.done{color:#10B981}
.step-item.has-alert{color:#EF4444}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:#F1F5F9;color:#64748B;flex-shrink:0}
.step-item.active .step-num{background:#0B1F3A;color:#fff}
.step-item.done .step-num{background:#10B981;color:#fff}
.step-item.has-alert .step-num{background:#EF4444;color:#fff}
.step-arr{color:#CBD5E1;font-size:16px;flex-shrink:0;padding:0 2px}
.main{padding:20px;max-width:1280px;margin:0 auto}

/* CARDS */
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px}
.card-sm{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px}
.card-title{font-size:14px;font-weight:700;color:#1E293B;margin-bottom:4px}
.card-sub{font-size:12px;color:#64748B;margin-bottom:14px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.b-ok{background:#D1FAE5;color:#065F46}
.b-warn{background:#FEF3C7;color:#92400E}
.b-danger{background:#FEE2E2;color:#991B1B}
.b-info{background:#DBEAFE;color:#1E40AF}
.b-neutral{background:#F1F5F9;color:#475569}
.b-purple{background:#EDE9FE;color:#5B21B6}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:#0B1F3A;color:#fff}
.btn-primary:hover{background:#1A3A5C}
.btn-accent{background:#00A8E8;color:#fff}
.btn-success{background:#10B981;color:#fff}
.btn-danger{background:#EF4444;color:#fff}
.btn-ghost{background:none;border:1px solid #E2E8F0;color:#64748B}
.btn-ghost:hover{background:#F8FAFC}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-lg{padding:11px 22px;font-size:13px}

/* ALERT CARDS */
.alert-card{border-radius:10px;padding:14px 16px;border-left:4px solid #E2E8F0;margin-bottom:10px;background:#fff;box-shadow:0 1px 3px #0001}
.alert-card.frozen{border-color:#EF4444;background:#FFF5F5}
.alert-card.slushy{border-color:#F59E0B;background:#FFFBEB}
.alert-card.liquid{border-color:#00C9B1;background:#F0FDFA}
.alert-card.gap{border-color:#8B5CF6;background:#F5F3FF}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#64748B;background:#F8FAFC;border-bottom:1px solid #E2E8F0;white-space:nowrap}
.tbl td{padding:9px 10px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
.tbl tr:hover td{background:#F8FAFC}
.tbl tr.alert-row td{background:#FFF5F5}
.tbl tr.family-row td{background:#F8FAFC;font-weight:700}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:8px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:8px 12px}
.search-box input{border:none;background:none;outline:none;font-size:13px;color:#1E293B;width:100%}

/* KPI */
.kpi{text-align:center;padding:14px;border-radius:10px;background:#F8FAFC;border:1px solid #E2E8F0}
.kpi-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#64748B}
.kpi-sub{font-size:10px;color:#94A3B8;margin-top:2px}

/* PROGRESS */
.pbar{height:6px;background:#E2E8F0;border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s}

/* SCORE RING */
.score-ring{border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid;flex-shrink:0}

/* ZONE CHIPS */
.z-frozen{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.z-slushy{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.z-liquid{background:#F0FDFA;color:#0F766E;border:1px solid #99F6E4;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}

/* DROP ZONE */
.drop-zone{border:2px dashed #CBD5E1;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#F8FAFC}
.drop-zone:hover,.drop-zone.drag{border-color:#00A8E8;background:#EFF9FF}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.flex{display:flex;align-items:center;gap:10px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.flex-wrap{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.mt-8{margin-top:8px} .mt-12{margin-top:12px} .mt-16{margin-top:16px}
.mb-8{margin-bottom:8px} .mb-12{margin-bottom:12px} .mb-16{margin-bottom:16px}
.gap-6{gap:6px} .gap-8{gap:8px} .gap-12{gap:12px}
.fw7{font-weight:700} .text-sm{font-size:12px} .text-xs{font-size:10px}
.text-muted{color:#64748B} .text-danger{color:#EF4444} .text-ok{color:#10B981}

/* MODAL */
.modal-ov{position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:28px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #0004}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#0B1F3A;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px #0004;z-index:9999;animation:fadeUp .3s ease}
@keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* TIMELINE */
.tl{padding-left:18px;position:relative}
.tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:#E2E8F0}
.tl-item{position:relative;padding-left:16px;padding-bottom:14px}
.tl-item::before{content:'';position:absolute;left:-13px;top:5px;width:9px;height:9px;border-radius:50%;background:#CBD5E1;border:2px solid #fff}
.tl-item.latest::before{background:#00A8E8}
.tl-item.has-alert::before{background:#EF4444}

/* ── DB CONNECTION ── */
.db-dot{width:8px;height:8px;border-radius:50%;background:#EF4444;flex-shrink:0}
.db-dot.connected{background:#10B981}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0B1F3Acc;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff}
.loading-overlay .spinner{width:36px;height:36px;border-width:3px}

</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════
// OPTIPLAN v0.6 — Demand Governance + Forecast Consumption
// ═══════════════════════════════════════════════════════

const C={navy:"#0B1F3A",blue:"#1A4A8A",accent:"#00A8E8",teal:"#00C9B1",warn:"#F59E0B",danger:"#EF4444",ok:"#10B981",muted:"#64748B"};

// ── CLIENTS T1 ──────────────────────────────────────────
let CLIENTS=[
  {id:"RNT",label:"Renault",      color:"#FFCC00",textColor:"#0B1F3A",freq:"Hebdomadaire",pays:"France"},
  {id:"STL",label:"Stellantis",   color:"#0066CC",textColor:"#fff",  freq:"Hebdomadaire",pays:"Franco-Italo-Américain"},
  {id:"VWG",label:"Volkswagen",   color:"#1B3A6B",textColor:"#fff",  freq:"Hebdomadaire",pays:"Allemagne"},
];

// ── FAMILLES & ITEMS ────────────────────────────────────
let FAMILLES=[
  {id:"CHA",label:"Châssis & Structure",     color:"#1A4A8A",icon:"ti-box"},
  {id:"SUS",label:"Suspension & Liaison",    color:"#7C3AED",icon:"ti-settings-2"},
  {id:"TRA",label:"Transmission",            color:"#0F766E",icon:"ti-rotate-clockwise"},
  {id:"THE",label:"Thermique & Échappement", color:"#B45309",icon:"ti-flame"},
  {id:"ELE",label:"Électrique & Électronique",color:"#0369A1",icon:"ti-bolt"},
];

let ITEMS=[
  // Renault — Châssis
  {id:"7700432156",label:"Support Berceau Moteur Avant",   cli:"RNT",fam:"CHA",bucket:"week",lt:3,pn:"RNT-CH-4412",uom:"PCS",prix:12.50},
  {id:"7700518823",label:"Platine Fixation Amortisseur AV",cli:"RNT",fam:"CHA",bucket:"week",lt:2,pn:"RNT-CH-0821",uom:"PCS",prix:8.90},
  // Renault — Suspension
  {id:"7700641047",label:"Bras de Suspension Avant G/D",   cli:"RNT",fam:"SUS",bucket:"week",lt:3,pn:"RNT-SU-6610",uom:"PCS",prix:22.40},
  {id:"7700788901",label:"Rotule Direction Extérieure",     cli:"RNT",fam:"SUS",bucket:"week",lt:2,pn:"RNT-SU-7889",uom:"PCS",prix:14.20},
  // Stellantis — Transmission
  {id:"9807345210",label:"Carter Boîte Vitesses",          cli:"STL",fam:"TRA",bucket:"week",lt:4,pn:"PSA-TR-3421",uom:"PCS",prix:45.80},
  {id:"9807412088",label:"Bracket Fixation Boîte",         cli:"STL",fam:"CHA",bucket:"week",lt:3,pn:"PSA-CH-4120",uom:"PCS",prix:18.60},
  // Stellantis — Suspension
  {id:"9807523661",label:"Bras de Liaison Arrière",        cli:"STL",fam:"SUS",bucket:"week",lt:4,pn:"PSA-SU-5236",uom:"PCS",prix:31.20},
  // Volkswagen — Thermique
  {id:"VWG8834210",label:"Bride Collecteur Échappement",   cli:"VWG",fam:"THE",bucket:"week",lt:2,pn:"VW-TH-8834",uom:"PCS",prix:9.80},
  {id:"VWG8901447",label:"Support Refroidisseur Huile",    cli:"VWG",fam:"THE",bucket:"week",lt:3,pn:"VW-TH-9014",uom:"PCS",prix:11.20},
  // Volkswagen — Électrique
  {id:"VWG9120034",label:"Support Batterie 48V",           cli:"VWG",fam:"ELE",bucket:"week",lt:5,pn:"VW-EL-9120",uom:"PCS",prix:67.50},
];

let SS_DATA={
  "7700432156":{ss:450},"7700518823":{ss:280},"7700641047":{ss:380},
  "7700788901":{ss:220},"9807345210":{ss:520},"9807412088":{ss:310},
  "9807523661":{ss:290},"VWG8834210":{ss:180},"VWG8901447":{ss:240},"VWG9120034":{ss:150},
};

const WEEKS=["S1","S2","S3","S4","S5","S6","S7","S8","S9","S10","S11","S12"];
const Z_TABLE={90:1.28,91:1.34,92:1.41,93:1.48,94:1.55,95:1.65,96:1.75,97:1.88,98:2.05,99:2.33,99.5:2.58,99.9:3.09};

const VOL_FAM={
  "CHA":[820,840,780,860,810,790,830,850,800,820,840,810],
  "SUS":[520,540,510,530,550,520,540,510,530,520,540,510],
  "TRA":[380,400,370,410,390,380,400,380,390,370,400,385],
  "THE":[280,290,270,300,285,275,295,280,290,270,300,285],
  "ELE":[150,160,145,165,155,148,158,152,161,147,163,155],
};

const DEFAULT_CFG={
  ts:{frozen:2,slushy:3,liquid:4},
  service:95,
  biasWarnPct:10,biasDangerPct:25,
  varWarnSlushy:15,varDangerSlushy:30,
  varWarnLiquid:20,varDangerLiquid:40,
};
let CFG={"RNT":{...DEFAULT_CFG},"STL":{...DEFAULT_CFG,service:98},"VWG":{...DEFAULT_CFG,biasWarnPct:8,biasDangerPct:20}};

// ── MATH ────────────────────────────────────────────────
function rng(s){let x=Math.sin(s)*10000;return x-Math.floor(x);}
function getZone(w){const i=parseInt(w.replace("S",""));return i<=2?"frozen":i<=5?"slushy":"liquid";}
function weekNum(){return Math.ceil((new Date()-new Date(new Date().getFullYear(),0,1))/(7*864e5));}

function buildEDI(seed,reception,fam){
  const base=VOL_FAM[fam]||VOL_FAM["CHA"];
  const qtys={};
  WEEKS.forEach((w,i)=>{
    let drift=1;
    if(reception>3){
      const z=getZone(w);
      if(z==="frozen")      drift=1+(reception-3)*0.09+rng(seed+reception+i)*0.04;
      else if(z==="slushy") drift=1+(reception-3)*0.03+rng(seed+i)*0.02;
      else                  drift=1-(reception-3)*0.035+rng(seed+i)*0.025;
    }
    qtys[w]=Math.max(0,Math.round(base[i]*drift*(0.95+rng(seed+reception*11+i)*0.10)));
  });
  const sw=20+reception; // simulate week numbers S20-S25
  return{
    id:`R0${reception}`,
    date:new Date(2024,reception+3,reception*3+1).toLocaleDateString("fr-FR"),
    sWeek:`S${sw}`,
    sYear:2024,
    qtys
  };
}

function buildAllEDI(){
  const h={};
  ITEMS.forEach((it,idx)=>{
    h[it.id]=[];
    for(let r=1;r<=6;r++) h[it.id].push(buildEDI((idx+1)*17,r,it.fam));
  });
  return h;
}

// KPI: Dernière révision S courante vs dernière révision S-1
function getRefPrev(recs){
  if(!recs||!recs.length)return{current:null,prev:null};
  // Group by sWeek
  const byWeek={};
  recs.forEach(r=>{
    if(!byWeek[r.sWeek]) byWeek[r.sWeek]=[];
    byWeek[r.sWeek].push(r);
  });
  const weeks=Object.keys(byWeek).sort();
  if(weeks.length<2) return{current:null,prev:null};
  const currentWeek=weeks[weeks.length-1];
  const prevWeek=weeks[weeks.length-2];
  const current=byWeek[currentWeek][byWeek[currentWeek].length-1];
  const prev=byWeek[prevWeek][byWeek[prevWeek].length-1];
  return{current,prev,currentWeek,prevWeek};
}

function calcFrozen(current,prev,cfg){
  const wks=WEEKS.filter(w=>getZone(w)==="frozen");
  const errors=wks.map(w=>(current.qtys[w]||0)-(prev.qtys[w]||0));
  const n=errors.length;
  const cum=errors.reduce((a,b)=>a+b,0);
  const mean=cum/n;
  const mad=errors.reduce((a,b)=>a+Math.abs(b),0)/n;
  const prevMean=wks.map(w=>prev.qtys[w]||0).reduce((a,b)=>a+b,0)/n;
  const biasPct=prevMean>0?Math.round(mean/prevMean*1000)/10:0;
  const ts=mad>0?Math.round(cum/mad*100)/100:0;
  const tsFlag=Math.abs(ts)>cfg.ts.frozen;
  const biasFlag=Math.abs(biasPct)>cfg.biasDangerPct;
  return{
    cum:Math.round(cum),mean:Math.round(mean*10)/10,biasPct,
    mad:Math.round(mad),ts,
    prevMean:Math.round(prevMean),
    direction:cum>0?"Sur-programmé":"Sous-programmé",
    tsFlag,biasFlag,flag:tsFlag||biasFlag,
    // Forecast Consumption
    totalForecast:Math.round(wks.map(w=>prev.qtys[w]||0).reduce((a,b)=>a+b,0)),
    totalCommande:Math.round(wks.map(w=>current.qtys[w]||0).reduce((a,b)=>a+b,0)),
  };
}

function calcZoneVar(current,prev,zone,cfg){
  const wks=WEEKS.filter(w=>getZone(w)===zone);
  const sumCurr=wks.reduce((a,w)=>a+(current.qtys[w]||0),0);
  const sumPrev=wks.reduce((a,w)=>a+(prev.qtys[w]||0),0);
  const varAbs=sumCurr-sumPrev;
  const varPct=sumPrev>0?Math.round(varAbs/sumPrev*1000)/10:0;
  const warnT=zone==="slushy"?cfg.varWarnSlushy:cfg.varWarnLiquid;
  const dangerT=zone==="slushy"?cfg.varDangerSlushy:cfg.varDangerLiquid;
  const flag=Math.abs(varPct)>warnT;
  const danger=Math.abs(varPct)>dangerT;
  return{sumCurr,sumPrev,varAbs,varPct,flag,danger,
    direction:varAbs>0?"Hausse":"Baisse",warnT,dangerT};
}

function calcMetrics(recs,cfg){
  if(!recs||!recs.length)return null;
  const {current,prev,currentWeek,prevWeek}=getRefPrev(recs);
  if(!current||!prev)return null;
  const frozen=calcFrozen(current,prev,cfg);
  const slushy=calcZoneVar(current,prev,"slushy",cfg);
  const liquid=calcZoneVar(current,prev,"liquid",cfg);
  return{frozen,slushy,liquid,current,prev,currentWeek,prevWeek};
}

function calcSS(mad,sl){return Math.round((Z_TABLE[sl]||1.65)*mad);}

function detectGaps(rec){
  return WEEKS.filter(w=>!rec.qtys[w]||rec.qtys[w]===0);
}

function classifyDemand(recs){
  if(!recs.length)return{type:"N/A",color:C.muted};
  const q=WEEKS.map(w=>recs[recs.length-1].qtys[w]||0);
  const mean=q.reduce((a,b)=>a+b,0)/q.length;
  const cv=mean>0?Math.sqrt(q.reduce((a,b)=>a+(b-mean)**2,0)/q.length)/mean:0;
  const trend=q[q.length-1]-q[0];
  if(cv<0.2&&Math.abs(trend)<mean*0.1)return{type:"Stable",color:C.ok};
  if(Math.abs(trend)>mean*0.3)return{type:trend>0?"Tendance ↑":"Tendance ↓",color:C.accent};
  if(Math.max(...q)/(Math.min(...q)||1)>1.5)return{type:"Saisonnière",color:C.warn};
  return{type:"Aléatoire",color:C.danger};
}

function clientScore(clientId){
  const items=ITEMS.filter(i=>i.cli===clientId);
  let total=0,flags=0;
  items.forEach(it=>{
    const m=calcMetrics(EDI_DATA[it.id],CFG[it.cli]||DEFAULT_CFG);
    if(!m)return;
    if(m.frozen.flag)flags++;
    if(m.slushy.danger)flags++;
    if(m.liquid.danger)flags++;
    total+=3;
  });
  return total>0?Math.round((1-flags/total)*100):100;
}

function getAllAlerts(){
  if(!ALERTS_DATA||!ALERTS_DATA.length) return [];

  const alerts = [];
  ALERTS_DATA.forEach(a => {
    const refId = String(a.REF_ID||"").trim();
    const it = ITEMS.find(i => i.id === refId);
    if(!it) return;

    const zone       = String(a.ZONE||"").toLowerCase();
    const priority   = zone==="frozen"?1:zone==="slushy"?2:zone==="liquid"?3:4;
    const value      = parseFloat(a.VALUE)     || 0;
    const thresh     = parseFloat(a.THRESHOLD) || 0;
    const direction  = a.DIRECTION  || "";
    const metricType = a.METRIC_TYPE|| "";
    const sWeek      = a.SEMAINE_RECEPTION || "";
    const receptionId= a.RECEPTION_ID || "";

    // Chercher les métriques complètes dans METRICS_DATA pour cette réception
    const met = METRICS_DATA.find(mx =>
      String(mx.REF_ID||"").trim() === refId &&
      mx.RECEPTION_ID === receptionId
    );

    // Construire m.frozen complet
    const frozen = {
      flag:          zone === "frozen",
      tsFlag:        metricType === "TRACKING_SIGNAL",
      biasFlag:      metricType === "BIAS_PCT",
      ts:            met ? (parseFloat(met.FROZEN_TS)||0)        : (metricType==="TRACKING_SIGNAL"?value:0),
      biasPct:       met ? (parseFloat(met.FROZEN_BIAS_PCT)||0)  : (metricType==="BIAS_PCT"?value:0),
      mad:           met ? (parseFloat(met.FROZEN_MAD)||0)       : 0,
      cum:           met ? (parseFloat(met.FROZEN_CUM_BIAS)||0)  : Math.round(value),
      mean:          met ? (parseFloat(met.FROZEN_MEAN_BIAS)||0) : 0,
      totalForecast: met ? (parseFloat(met.FROZEN_TOTAL_FORECAST)||0) : "—",
      totalCommande: met ? (parseFloat(met.FROZEN_TOTAL_COMMANDE)||0) : "—",
      direction,
    };

    // Construire m.slushy et m.liquid
    const slushy = {
      flag:    zone === "slushy",
      danger:  zone === "slushy",
      varPct:  met ? (parseFloat(met.SLUSHY_VAR_PCT)||0) : (zone==="slushy"?value:0),
      varAbs:  met ? (parseFloat(met.SLUSHY_VAR_ABS)||0) : 0,
      sumCurr: met ? (parseFloat(met.SLUSHY_SUM_CURR)||0): 0,
      sumPrev: met ? (parseFloat(met.SLUSHY_SUM_PREV)||0): 0,
      direction,
    };
    const liquid = {
      flag:    zone === "liquid",
      danger:  zone === "liquid",
      varPct:  met ? (parseFloat(met.LIQUID_VAR_PCT)||0) : (zone==="liquid"?value:0),
      varAbs:  met ? (parseFloat(met.LIQUID_VAR_ABS)||0) : 0,
      sumCurr: met ? (parseFloat(met.LIQUID_SUM_CURR)||0): 0,
      sumPrev: met ? (parseFloat(met.LIQUID_SUM_PREV)||0): 0,
      direction,
    };

    alerts.push({
      item: it, zone, m: {frozen, slushy, liquid},
      type: "drift", priority, flag: true,
      sWeek, reception: receptionId,
    });
  });

  // Gaps calculés localement (non stockés en BDD)
  ITEMS.forEach(it => {
    const recs = EDI_DATA[it.id]||[];
    const {current} = getRefPrev(recs);
    const gaps = current ? detectGaps(current) : [];
    if(gaps.length > 0)
      alerts.push({item:it, zone:"gap", gaps, type:"gap", priority:4, flag:true});
  });

  return alerts.sort((a,b) => a.priority - b.priority);
}

// Hash pour anti-doublon
function hashEDI(parsed){
  const key=`${parsed.meta.emetteur}|${parsed.meta.date}|${parsed.rows.map(r=>r.REFERENCE+"_"+Object.values(r._qtys||{}).slice(0,3).join(",")).join("|")}`;
  let h=0;for(let i=0;i<key.length;i++){h=(h<<5)-h+key.charCodeAt(i);h|=0;}
  return Math.abs(h).toString(16);
}

// ── ANALYSE ──────────────────────────────────────────────
function renderAnalyse(){
  const it=ITEMS.find(i=>i.id===S.selectedItem)||ITEMS[0];
  const cfg=CFG[it.cli]||DEFAULT_CFG;
  const recs=EDI_DATA[it.id];
  const m=calcMetrics(recs,cfg);
  const {current,prev,currentWeek,prevWeek}=getRefPrev(recs)||{};
  const p=classifyDemand(recs);
  const cl=CLIENTS.find(c=>c.id===it.cli);
  const fam=FAMILLES.find(f=>f.id===it.fam);
  const avgMad=m?m.frozen.mad:0;
  const ss=calcSS(avgMad,cfg.service);
  const ssAct=SS_DATA[it.id]?.ss||0;
  const gap=ss-ssAct;

  // SVG
  const W=600,H=180,pL=42,pR=10,pT=14,pB=24;
  const pw=W-pL-pR,ph=H-pT-pB;
  const maxQ=Math.max(...recs.flatMap(r=>WEEKS.map(w=>r.qtys[w]||0)),1);
  const LC=["#CBD5E1","#94A3B8","#60A5FA",C.accent,C.teal,C.blue];
  const px=i=>pL+i/(WEEKS.length-1)*pw;
  const py=v=>pT+ph-(v/maxQ)*ph;
  const xSlu=px(2),xLiq=px(5);
  const grid=[0,.25,.5,.75,1].map(p=>{
    const y=pT+ph*(1-p);
    return`<line x1="${pL}" x2="${W-pR}" y1="${y}" y2="${y}" stroke="#F1F5F9" stroke-width="1"/>
    <text x="${pL-4}" y="${y+3}" text-anchor="end" font-size="8" fill="#94A3B8">${Math.round(maxQ*p)}</text>`;
  }).join("");
  const svgLines=recs.map((r,ri)=>{
    const pts=WEEKS.map((w,wi)=>`${px(wi)},${py(r.qtys[w]||0)}`).join(" ");
    const isLast=ri===recs.length-1;
    return`<polyline points="${pts}" fill="none" stroke="${LC[ri]}" stroke-width="${isLast?2.5:1.2}" stroke-opacity="${isLast?1:0.5}" stroke-linejoin="round"/>`;
  }).join("");

      <!-- LIQUID -->
      <div style="border-left:3px solid ${C.teal};padding:10px 12px;background:${m.liquid.danger?"#F0FDFA":"#F8FAFC"};border-radius:0 8px 8px 0">
        <div class="flex-between mb-6">
          <span class="z-liquid">Zone Flexible (S6-S12)</span>
          ${m.liquid.danger?`<span class="badge b-warn">Variation forte</span>`:m.liquid.flag?`<span class="badge b-warn">Surveiller</span>`:`<span class="badge b-ok">OK</span>`}
        </div>
        <div class="g2">
          <div style="text-align:center">
            <div style="font-size:9px;color:#64748B">Variation globale</div>

// ── RAPPORT EXHAUSTIF ────────────────────────────────────
function renderReport(){
  const rf=S.reportFilter;
  const filtered=ITEMS.filter(it=>
    (rf.client==="all"||it.cli===rf.client)&&
    (rf.famille==="all"||it.fam===rf.famille)&&
    (!rf.search||it.id.toLowerCase().includes(rf.search.toLowerCase())||it.label.toLowerCase().includes(rf.search.toLowerCase()))
  ).filter(it=>{
    if(rf.status==="all")return true;
    const m=calcMetrics(EDI_DATA[it.id],CFG[it.cli]||DEFAULT_CFG);
    const hasFlag=m&&(m.frozen.flag||m.slushy.danger||m.liquid.danger);
    if(rf.status==="alert")return hasFlag;
    if(rf.status==="ok")return !hasFlag;
    return true;
  });

  const allAlerts=getAllAlerts();

  // KPIs agrégés par famille
  const famKPIs=FAMILLES.map(fam=>{
    const items=ITEMS.filter(i=>i.fam===fam.id);
    let totalMad=0,flagCount=0,n=0;
    items.forEach(it=>{
      const m=calcMetrics(EDI_DATA[it.id],CFG[it.cli]||DEFAULT_CFG);
      if(m){totalMad+=m.frozen.mad;if(m.frozen.flag||m.slushy.danger)flagCount++;n++;}
    });
    return{fam,items,avgMad:n>0?Math.round(totalMad/n):0,flagCount,n};
  });

  return`
  <!-- FILTRES -->
  <div class="card mb-16">
    <div class="flex-between mb-12">
      <div class="card-title">Rapport exhaustif — Analyse complète</div>
      <div class="flex gap-6">
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()"><i class="ti ti-file-spreadsheet"></i> Export CSV</button>
        <button class="btn btn-ghost btn-sm" onclick="printReport()"><i class="ti ti-file-type-pdf"></i> PDF</button>
        <button class="btn btn-primary btn-sm" onclick="showEmailModal()"><i class="ti ti-mail-forward"></i> Email</button>
      </div>
    </div>
    <div class="flex-wrap gap-6">
      <div class="search-box" style="width:250px">
        <i class="ti ti-search" style="color:#94A3B8"></i>
        <input type="text" placeholder="Rechercher..." value="${rf.search}" oninput="update({reportFilter:{...S.reportFilter,search:this.value}})">
      </div>
      <select onchange="update({reportFilter:{...S.reportFilter,client:this.value}})" style="padding:7px 10px;border:1px solid #E2E8F0;border-radius:8px;font-size:12px;outline:none">
        <option value="all">Tous les clients T1</option>
        ${CLIENTS.map(c=>`<option value="${c.id}"${rf.client===c.id?" selected":""}>${c.label}</option>`).join("")}
      </select>
      <select onchange="update({reportFilter:{...S.reportFilter,famille:this.value}})" style="padding:7px 10px;border:1px solid #E2E8F0;border-radius:8px;font-size:12px;outline:none">
        <option value="all">Toutes les familles</option>
        ${FAMILLES.map(f=>`<option value="${f.id}"${rf.famille===f.id?" selected":""}>${f.label}</option>`).join("")}
      </select>
      ${["all","alert","ok"].map(s=>`<button onclick="update({reportFilter:{...S.reportFilter,status:'${s}'}})" style="
        background:${rf.status===s?"#0B1F3A":"#fff"};color:${rf.status===s?"#fff":"#64748B"};
        border:1px solid ${rf.status===s?"#0B1F3A":"#E2E8F0"};border-radius:99px;padding:5px 14px;font-size:12px;font-weight:600">
        ${{all:"Tous",alert:"Alertes uniquement",ok:"OK uniquement"}[s]}
      </button>`).join("")}
      <span class="text-muted text-sm" style="margin-left:4px">${filtered.length} référence${filtered.length>1?"s":""}</span>
    </div>
  </div>

  <!-- KPIs AGRÉGÉS PAR FAMILLE (S&OP) -->
  <div class="card mb-16">
    <div class="flex-between mb-12">
      <div>
        <div class="card-title">Synthèse par famille — Niveau S&OP</div>
        <div class="card-sub">Agrégation des indicateurs pour la revue S&OP</div>
      </div>
    </div>
    <table class="tbl">
      <thead><tr>
        <th>Famille</th><th>Références</th><th>MAD moyen</th>
        <th>SS total estimé</th><th>Valeur stock (€)</th>
        <th>Alertes</th><th>Stabilité</th>
      </tr></thead>
      <tbody>
        ${famKPIs.map(({fam,items,avgMad,flagCount,n})=>{
          const totalSS=items.reduce((a,it)=>{const m=calcMetrics(EDI_DATA[it.id],CFG[it.cli]||DEFAULT_CFG);return a+calcSS(m?m.frozen.mad:0,CFG[it.cli]?.service||95);},0);
          const totalVal=items.reduce((a,it)=>a+(SS_DATA[it.id]?.ss||0)*it.prix,0);
          const stability=n>0?Math.round((1-flagCount/n)*100):100;
          const sc=stability>=85?C.ok:stability>=65?C.warn:C.danger;
          return`<tr class="family-row">
            <td><div style="display:flex;align-items:center;gap:8px">
              <i class="ti ${fam.icon}" style="color:${fam.color}"></i>
              <span style="color:${fam.color}">${fam.label}</span>
            </div></td>
            <td class="fw7">${items.length}</td>
            <td class="fw7">${avgMad} u.</td>
            <td class="fw7">${totalSS} u.</td>
            <td class="fw7">${totalVal.toLocaleString("fr-FR",{minimumFractionDigits:0})} €</td>
            <td>${flagCount>0?`<span class="badge b-danger">${flagCount} alerte${flagCount>1?"s":""}</span>`:`<span class="badge b-ok">✓</span>`}</td>
            <td>
              <div class="flex gap-8">
                <span style="font-weight:700;color:${sc}">${stability}%</span>
                <div class="pbar" style="width:80px;margin-top:2px"><div class="pbar-fill" style="width:${stability}%;background:${sc}"></div></div>
              </div>
            </td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>

  <!-- TABLEAU DÉTAILLÉ PAR RÉFÉRENCE (MPS) -->
  <div class="card">
    <div class="flex-between mb-12">
      <div>
        <div class="card-title">Détail par référence — Niveau MPS</div>
        <div class="card-sub">Forecast Consumption + Variation zones + Safety Stock</div>
      </div>
    </div>
    <div style="overflow-x:auto">
    <table class="tbl">
      <thead><tr>
        <th>Référence</th><th>Désignation</th><th>Famille</th><th>Client T1</th>
        <th colspan="3" style="text-align:center;background:#EFF6FF;color:#1D4ED8">Zone Figée — Forecast Consumption</th>
        <th colspan="2" style="text-align:center;background:#FFFBEB;color:#B45309">Semi-figée</th>
        <th colspan="2" style="text-align:center;background:#F0FDFA;color:#0F766E">Flexible</th>
        <th>SS Calc.</th><th>SS Act.</th><th>Gap SS</th><th>Statut</th>
      </tr>
      <tr style="background:#F8FAFC">
        <th colspan="4"></th>
        <th style="background:#EFF6FF;color:#1D4ED8">Écart%</th>
        <th style="background:#EFF6FF;color:#1D4ED8">MAD</th>
        <th style="background:#EFF6FF;color:#1D4ED8">TS</th>
        <th style="background:#FFFBEB;color:#B45309">Var%</th>
        <th style="background:#FFFBEB;color:#B45309">Δ u.</th>
        <th style="background:#F0FDFA;color:#0F766E">Var%</th>
        <th style="background:#F0FDFA;color:#0F766E">Δ u.</th>
        <th colspan="4"></th>
      </tr>
      </thead>
      <tbody>
        ${filtered.map(it=>{
          const cfg=CFG[it.cli]||DEFAULT_CFG;
          const m=calcMetrics(EDI_DATA[it.id],cfg);
          const p=classifyDemand(EDI_DATA[it.id]);
          const ssCalc=calcSS(m?m.frozen.mad:0,cfg.service);
          const ssAct=SS_DATA[it.id]?.ss||0;
          const gap=ssCalc-ssAct;
          const hasFlag=m&&(m.frozen.flag||m.slushy.danger||m.liquid.danger);
          const cl=CLIENTS.find(c=>c.id===it.cli);
          const fam=FAMILLES.find(f=>f.id===it.fam);
          return`<tr class="${hasFlag?"alert-row":""}">
            <td style="font-family:monospace;font-size:11px;font-weight:700;color:${C.blue}">${it.id}</td>
            <td style="font-size:12px">${it.label}</td>
            <td><span style="font-size:10px;font-weight:700;color:${fam?.color}">${fam?.label}</span></td>
            <td><span style="font-weight:700;font-size:11px;color:${cl.color==="#FFCC00"?"#0B1F3A":cl.color}">${cl.label}</span></td>
            ${m?`
            <td style="text-align:center;background:#EFF6FF20;font-weight:700;color:${m.frozen.biasFlag?C.danger:C.ok}">${m.frozen.biasPct>0?"+":""}${m.frozen.biasPct}%</td>
            <td style="text-align:center;background:#EFF6FF20;font-weight:700">${m.frozen.mad}</td>
            <td style="text-align:center;background:#EFF6FF20;font-weight:700;color:${m.frozen.tsFlag?C.danger:C.ok}">${m.frozen.ts}${m.frozen.tsFlag?" 🚨":" ✓"}</td>
            <td style="text-align:center;background:#FFFBEB20;font-weight:700;color:${m.slushy.danger?C.danger:m.slushy.flag?C.warn:C.ok}">${m.slushy.varPct>0?"+":""}${m.slushy.varPct}%</td>
            <td style="text-align:center;background:#FFFBEB20;color:${m.slushy.varAbs>0?C.danger:C.ok}">${m.slushy.varAbs>0?"+":""}${m.slushy.varAbs}</td>
            <td style="text-align:center;background:#F0FDFA20;font-weight:700;color:${m.liquid.danger?C.danger:m.liquid.flag?C.warn:C.ok}">${m.liquid.varPct>0?"+":""}${m.liquid.varPct}%</td>
            <td style="text-align:center;background:#F0FDFA20;color:${m.liquid.varAbs>0?C.danger:C.ok}">${m.liquid.varAbs>0?"+":""}${m.liquid.varAbs}</td>
            `:`<td colspan="7" style="text-align:center;color:#94A3B8">—</td>`}
            <td style="text-align:center;font-weight:700;color:${C.teal}">${ssCalc}</td>
            <td style="text-align:center">${ssAct}</td>
            <td style="text-align:center;font-weight:700;color:${gap>0?C.danger:C.ok}">${gap>0?"+":""}${gap}</td>
            <td>${hasFlag?`<span class="badge b-danger">Alerte</span>`:`<span class="badge b-ok">OK</span>`}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
    </div>
  </div>`;
}

// ── CSV PARSE ─────────────────────────────────────────────
function parseEDI(text,fileName){
  const lines=text.split(/\r?\n/).filter(l=>l.trim()&&l.replace(/;/g,"").trim());
  const meta={};let hi=-1,cols=[],periods=[],bucket="week",rows=[];
  lines.forEach(line=>{
    const cells=line.split(";").map(c=>c.trim().replace(/^\uFEFF/,"").replace(/"/g,""));
    const k=cells[0].toUpperCase();
    if(k==="EMETTEUR")meta.emetteur=cells[1];
    else if(k==="DATE_EMISSION")meta.date=cells[1];
    else if(k==="RECEPTION_NUM")meta.reception=cells[1];
    else if(k==="SEMAINE_RECEPTION")meta.sWeek=cells[1];
    else if(k==="ANNEE")meta.year=cells[1];
    else if(k==="REFERENCE"){
      hi=1;cols=cells;
      periods=cols.filter(c=>c.match(/^S\d+$|^\d{2}\/\d{2}$/));
      bucket=periods[0]?.match(/^\d{2}\/\d{2}$/)?"day":"week";
    } else if(hi>0&&cells[0].match(/^[A-Z0-9]/)){
      const row={};cols.forEach((c,j)=>{row[c]=cells[j]||"";});
      row._qtys={};periods.forEach(p=>{row._qtys[p]=parseInt(row[p])||0;});
      row._periods=periods;row._bucket=bucket;rows.push(row);
    }
  });
  return{meta,rows,periods,bucket,fileName,valid:rows.length>0};
}

function parseMaster(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const r={};
  let colRef=0,colSS=1,colUOM=2,colPrix=3,colLabel=-1,colCli=-1,colFam=-1,colPn=-1,colBucket=-1;
  lines.forEach((l,i)=>{
    const c=l.split(";").map(x=>x.trim().replace(/^\uFEFF/,""));
    if(i===0){
      const up=c.map(x=>x.toUpperCase());
      const fi=(terms)=>up.findIndex(x=>terms.some(t=>x.includes(t)));
      const r2=fi(["REFERENCE","REF_ID","REF"]); if(r2>=0)colRef=r2;
      const s=fi(["SS_ACTUEL","SS"]); if(s>=0)colSS=s;
      const u=fi(["UOM"]); if(u>=0)colUOM=u;
      const p=fi(["PRIX","PRICE"]); if(p>=0)colPrix=p;
      colLabel =fi(["LABEL","DESIGNATION"]);
      colCli   =fi(["CLIENT_ID","CLIENT","CLI"]);
      colFam   =fi(["FAMILLE","FAM"]);
      colPn    =fi(["PN_CLIENT","PN"]);
      colBucket=fi(["BUCKET"]);
      return;
    }
    const ref=(c[colRef]||"").trim();
    const ss=parseInt(c[colSS])||0;
    if(!ref)return;
    r[ref]={
      ss,
      uom:     c[colUOM]||"PCS",
      prix:    parseFloat(c[colPrix])||0,
      label:   colLabel>=0?c[colLabel]||ref:ref,
      cli:     colCli>=0?c[colCli]||"":"",
      fam:     colFam>=0?c[colFam]||"":"",
      pn:      colPn>=0?c[colPn]||"":"",
      bucket:  colBucket>=0?c[colBucket]||"week":"week",
    };
  });
  return r;
}

let pendingFiles=[];

function handleEDIFiles(files){
  pendingFiles=[...files].map(f=>new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>res(parseEDI(e.target.result,f.name));
    r.readAsText(f,"utf-8");
  }));
  Promise.all(pendingFiles).then(parsed=>{
    // Attacher le hash à chaque fichier — la déduplication réelle est faite côté BDD
    const toImport=parsed.map(p=>({...p,hash:hashEDI(p)}));
    S.importedFiles=toImport;

    const el=document.getElementById("ediFileList");
    if(el)el.innerHTML=toImport.map(p=>`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;padding:7px 10px;background:#F0FDF4;border-radius:8px;border:1px solid #BBF7D0">
        <i class="ti ti-file-spreadsheet" style="color:${C.ok}"></i>
        <span style="flex:1;font-size:12px;font-weight:600">${p.fileName}</span>
        <span class="text-muted text-sm">${p.rows.length} réf · ${p.meta.sWeek||"—"}</span>
        <span class="badge b-ok">✓ Prêt</span>
      </div>`).join("");

    const prev=document.getElementById("importPreview");
    if(prev&&toImport.length>0)prev.innerHTML=`<div style="background:#EFF9FF;border:1px solid #BAE6FD;border-radius:8px;padding:10px 12px;font-size:12px">
      <div style="font-weight:700;color:${C.accent};margin-bottom:4px"><i class="ti ti-eye" style="margin-right:4px"></i>Aperçu · ${toImport.length} fichier(s) prêt(s)</div>
      ${toImport.map(f=>`<div class="text-muted" style="margin-top:3px">${f.fileName} · ${f.meta.sWeek||"?"} · ${f.meta.date||""} · ${f.rows.length} réf.</div>`).join("")}
    </div>`;

    const btn=document.getElementById("importActionBtn");
    if(btn)btn.style.display=toImport.length>0?"block":"none";
  });
}

function handleMasterFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const data=parseMaster(e.target.result);
    const count=Object.keys(data).length;
    const el=document.getElementById("masterStatus");
    if(el)el.innerHTML=`<div class="flex gap-8 mt-8">
      <div class="badge b-ok" style="padding:6px 10px"><i class="ti ti-circle-check" style="margin-right:4px"></i>${count} articles prêts</div>
      ${DB_CONNECTED?`<button class="btn btn-success btn-sm" onclick="importMasterToDB(${JSON.stringify(data).replace(/"/g,'&quot;')})">
        <i class="ti ti-cloud-upload"></i> Enregistrer dans la base de données
      </button>`:`<span class="text-sm text-muted">Connectez la BDD pour synchroniser</span>`}
    </div>`;
    showToast(`${count} SS actuel parsés`,"ti-package");
    if(DB_CONNECTED)importMasterToDB(data);
  };
  r.readAsText(file,"utf-8");
}

      m?(m.slushy.varAbs>0?"+":"")+m.slushy.varAbs:"—",

      m?(m.liquid.varPct>0?"+":"")+m.liquid.varPct+"%":"—",
      m?(m.liquid.varAbs>0?"+":"")+m.liquid.varAbs:"—",
      m?(m.liquid.danger?"ALERTE":m.liquid.flag?"SURVEILLER":"OK"):"—",
      ssCalc,ssAct,(ssCalc-ssAct>0?"+":"")+(ssCalc-ssAct),
      p.type,hasFlag?"ALERTE":"OK"
    ]);
  });
  const csv=rows.map(r=>r.join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`OPTIPLAN_Rapport_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
  showToast("Export CSV généré (S&OP + MPS)","ti-file-spreadsheet");
}

// ════════════════════════════════════════════════════════════
// OPTIPLAN v0.6 — Couche connexion base de données
// Tout en GET (no CORS depuis GitHub Pages)
// ════════════════════════════════════════════════════════════

const DB_URL_DEFAULT = "https://script.google.com/macros/s/AKfycbxJkdjyPuR4fvQfftFp_0lJMD4uCvtDeCE5OS67iKx19L-_5bRmLAFEvKSiCGRsXjZy-Q/exec";
let DB_URL = localStorage.getItem("optiplan_db_url") || DB_URL_DEFAULT;
let DB_CONNECTED = false;
let DB_LOADING   = false;

async function dbGet(params) {
  const url = new URL(DB_URL);
  Object.entries(params).forEach(([k,v]) =>
    url.searchParams.set(k, typeof v === "object" ? JSON.stringify(v) : v)
  );
  try {
    const res = await fetch(url.toString(), {redirect:"follow"});
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    return json;
  } catch(e) {
    throw new Error("BDD: " + e.message);
  }
}

// ── CHARGEMENT INITIAL ────────────────────────────────────
async function loadFromDB() {
  DB_LOADING = true;
  S.dbError  = null;
  render();
  try {
    // 1. Config clients
    const cfgRes = await dbGet({action:"getConfig"});
    CLIENTS = cfgRes.data;
    CFG = {};
    CLIENTS.forEach(c => { CFG[c.id] = c; });

    // 2. Familles
    const famRes = await dbGet({action:"getFamilles"});
    FAMILLES = famRes.data;

    // 3. Items
    const itemsRes = await dbGet({action:"getItems"});
    ITEMS = itemsRes.data;
    SS_DATA = {};
    ITEMS.forEach(i => { SS_DATA[i.id] = {ss: i.ss_actuel, prix: i.prix}; });

    // 4. Historique EDI
    const ediRes = await dbGet({action:"getEDIHistory"});
    EDI_DATA = {};
    Object.entries(ediRes.data).forEach(([ref, recs]) => {
      EDI_DATA[ref] = recs;
    });
    ITEMS.forEach(it => { if (!EDI_DATA[it.id]) EDI_DATA[it.id] = []; });

    // 5. Métriques depuis la BDD
    const metricsRes = await dbGet({action:"getMetrics"});
    METRICS_DATA = metricsRes.data || [];

    // 6. Alertes depuis la BDD
    const alertsRes = await dbGet({action:"getAlerts"});
    ALERTS_DATA = alertsRes.data || [];

    if (!S.selectedItem  && ITEMS.length)   S.selectedItem   = ITEMS[0].id;
    if (!S.selectedClient && CLIENTS.length) S.selectedClient = CLIENTS[0].id;

    DB_CONNECTED = true;
    ALERTS_CACHE = null;
    showToast("Base de données connectée", "ti-database");
  } catch(e) {
    S.dbError = e.message;
    DB_CONNECTED = false;
  } finally {
    DB_LOADING  = false;
    render();
  }
}

// ── IMPORT EDI → BDD ─────────────────────────────────────
async function importToDB(parsedFiles) {
  if (!DB_CONNECTED) { showToast("Connectez d'abord la base de données","ti-alert-triangle"); return; }
  showLoadingOverlay("Import en cours...");
  let totalImported = 0;
  const errors = [];

  for (const f of parsedFiles) {
    const rows = f.rows.map(row => {
      const ref = (row.REFERENCE || "").trim();
      const it  = ITEMS.find(i => i.id === ref);
      if (!it) return null;
      const qtys = {};
      f.periods.forEach(p => { qtys[p] = parseInt(row._qtys[p]) || 0; });
      return { ref, clientId: it.cli, bucket: f.bucket || "week", qtys };
    }).filter(Boolean);

    if (!rows.length) { errors.push(f.fileName + ": aucune référence reconnue"); continue; }

    // Si SEMAINE_RECEPTION absente du CSV, générer depuis RECEPTION_NUM pour garantir l'unicité
    const sWeekFinal = f.meta.sWeek || f.meta.reception || ("R" + Date.now());
    const payload = {
      hash:     f.hash || "",
      fileName: f.fileName,
      meta: {
        reception: f.meta.reception,
        date:      f.meta.date,
        sWeek:     sWeekFinal,
        year:      f.meta.year  || new Date().getFullYear(),
        revNum:    parseInt(f.meta.revNum) || 1,
        emetteur:  f.meta.emetteur || "",
      },
      rows,
    };

    try {
      const res = await dbGet({action:"importEDI", data: JSON.stringify(payload)});
      totalImported += res.imported || 0;
      if (res.skipped > 0) showToast(`${res.skipped} ligne(s) déjà existante(s) — ignorée(s)`,"ti-info-circle",2500);
    } catch(e) {
      errors.push(f.fileName + ": " + e.message);
    }
  }

  hideLoadingOverlay();
  if (errors.length) showToast("Erreur: " + errors[0], "ti-alert-triangle", 5000);
  else showToast(`${totalImported} référence(s) importée(s)`, "ti-circle-check");

  await loadFromDB();  // recharge aussi ALERTS_DATA
  S.importResult = true;
  S.importedFiles = [];
  go("verify");
}

// ── IMPORT MASTER SS → BDD ────────────────────────────────
async function importMasterToDB(masterData) {
  if (!DB_CONNECTED) { showToast("Connectez d'abord la base de données","ti-alert-triangle"); return; }
  showLoadingOverlay("Mise à jour SS...");
  const rows = Object.entries(masterData).map(([ref,v]) => ({
    ref,
    ss_actuel: v.ss   || 0,
    uom:       v.uom  || "PCS",
    prix:      v.prix || 0,
    label:     v.label|| ref,
    cli:       v.cli  || "",
    fam:       v.fam  || "",
    pn:        v.pn   || "",
    bucket:    v.bucket|| "week",
  }));
  try {
    await dbGet({action:"importMaster", data: JSON.stringify(rows)});
    showToast(`${rows.length} SS mis à jour`, "ti-circle-check");
    await loadFromDB();
  } catch(e) {
    showToast("Erreur: " + e.message, "ti-alert-triangle");
  } finally {
    hideLoadingOverlay();
  }
}
