<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTIPLAN — Demand Governance v0.5</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F0F4F8;color:#1E293B;font-size:14px}
button{cursor:pointer;font-family:inherit;transition:all .15s}
input,select,textarea{font-family:inherit}

/* ── LAYOUT ── */
.topbar{background:#0B1F3A;height:52px;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px #0006}
.logo-text{font-size:18px;font-weight:900;color:#fff;letter-spacing:-0.5px}
.logo-accent{font-weight:300;color:#00A8E8;letter-spacing:2px}
.topbar-sep{width:1px;height:24px;background:#ffffff22}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ── WORKFLOW STEPS ── */
.steps-bar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 20px;display:flex;align-items:center;gap:0;overflow-x:auto}
.step-item{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;color:#64748B;font-size:13px;font-weight:500}
.step-item.active{border-bottom-color:#00A8E8;color:#0B1F3A;font-weight:700}
.step-item.done{color:#10B981}
.step-item.alert{color:#EF4444}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#F1F5F9;color:#64748B;flex-shrink:0}
.step-item.active .step-num{background:#0B1F3A;color:#fff}
.step-item.done .step-num{background:#10B981;color:#fff}
.step-item.alert .step-num{background:#EF4444;color:#fff}
.step-arrow{color:#CBD5E1;font-size:18px;flex-shrink:0}

.main{padding:20px;max-width:1200px;margin:0 auto}

/* ── CARDS ── */
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px}
.card-sm{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px}
.card-title{font-size:14px;font-weight:700;color:#1E293B;margin-bottom:4px}
.card-sub{font-size:12px;color:#64748B;margin-bottom:16px}

/* ── STATUS BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.badge-ok{background:#D1FAE5;color:#065F46}
.badge-warn{background:#FEF3C7;color:#92400E}
.badge-danger{background:#FEE2E2;color:#991B1B}
.badge-info{background:#DBEAFE;color:#1E40AF}
.badge-neutral{background:#F1F5F9;color:#475569}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.btn-primary{background:#0B1F3A;color:#fff}
.btn-primary:hover{background:#1A3A5C}
.btn-accent{background:#00A8E8;color:#fff}
.btn-accent:hover{background:#0090C8}
.btn-success{background:#10B981;color:#fff}
.btn-danger{background:#EF4444;color:#fff}
.btn-ghost{background:none;border:1px solid #E2E8F0;color:#64748B}
.btn-ghost:hover{background:#F8FAFC}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:14px}

/* ── ALERT CARDS ── */
.alert-card{border-radius:10px;padding:14px 16px;border-left:4px solid;margin-bottom:10px;background:#fff;border-color:#E2E8F0;box-shadow:0 1px 3px #0001}
.alert-card.frozen{border-color:#EF4444;background:#FFF5F5}
.alert-card.slushy{border-color:#F59E0B;background:#FFFBEB}
.alert-card.liquid{border-color:#00C9B1;background:#F0FDFA}
.alert-card.gap{border-color:#8B5CF6;background:#F5F3FF}

/* ── SEARCH ── */
.search-box{display:flex;align-items:center;gap:8px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:8px 12px}
.search-box input{border:none;background:none;outline:none;font-size:13px;color:#1E293B;width:100%}
.search-box i{color:#94A3B8;font-size:16px}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748B;background:#F8FAFC;border-bottom:1px solid #E2E8F0}
.tbl td{padding:10px 12px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
.tbl tr:hover td{background:#F8FAFC}
.tbl tr.alert-row td{background:#FFF5F5}

/* ── KPI BOX ── */
.kpi{text-align:center;padding:14px;border-radius:10px;background:#F8FAFC;border:1px solid #E2E8F0}
.kpi-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748B}
.kpi-sub{font-size:10px;color:#94A3B8;margin-top:2px}

/* ── PROGRESS BAR ── */
.pbar{height:6px;background:#E2E8F0;border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s}

/* ── SCORE RING ── */
.score-ring{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:5px solid;flex-shrink:0}

/* ── ZONE CHIPS ── */
.zone-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.zone-frozen{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.zone-slushy{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A}
.zone-liquid{background:#F0FDFA;color:#0F766E;border:1px solid #99F6E4}

/* ── DROP ZONE ── */
.drop-zone{border:2px dashed #CBD5E1;border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#F8FAFC}
.drop-zone:hover,.drop-zone.drag{border-color:#00A8E8;background:#EFF9FF}

/* ── TOPBAR BUTTONS ── */
.topbar-btn{background:#1e3a5f;border:none;color:#94a3b8;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.topbar-btn:hover{background:#2a4a6f;color:#fff}
.topbar-btn.active{background:#00A8E833;color:#00A8E8}

/* ── MODAL ── */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:28px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #0004}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:#64748B;margin-bottom:20px}

/* ── HISTORY TIMELINE ── */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:#E2E8F0}
.timeline-item{position:relative;padding-bottom:16px;padding-left:16px}
.timeline-item::before{content:'';position:absolute;left:-14px;top:4px;width:10px;height:10px;border-radius:50%;background:#CBD5E1;border:2px solid #fff}
.timeline-item.latest::before{background:#00A8E8}
.timeline-item.alert::before{background:#EF4444}

/* ── NOTIFICATION TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:#0B1F3A;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px #0004;z-index:9999;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── RESPONSIVE ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.flex{display:flex;align-items:center;gap:12px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap-8{gap:8px}
.gap-4{gap:4px}
.mt-4{margin-top:4px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.text-sm{font-size:12px}
.text-xs{font-size:10px}
.text-muted{color:#64748B}
.text-danger{color:#EF4444}
.text-ok{color:#10B981}
.text-warn{color:#F59E0B}
.fw-700{font-weight:700}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CONSTANTS ──────────────────────────────────────────────
const C={
  navy:"#0B1F3A",blue:"#1A4A8A",accent:"#00A8E8",teal:"#00C9B1",
  warn:"#F59E0B",danger:"#EF4444",ok:"#10B981",muted:"#64748B"
};

const CLIENTS=[
  {id:"RNT",label:"Renault T1",    color:"#1A4A8A",freq:"hebdo"},
  {id:"STL",label:"Stellantis T1", color:"#7C3AED",freq:"hebdo"},
  {id:"VLO",label:"Valeo T1",      color:"#0F766E",freq:"quotidien"},
];

const ITEMS=[
  {id:"7700432156",label:"Support Berceau Moteur AV",    cli:"RNT",bucket:"week",famille:"Châssis",    pn:"RNT-CH-4412"},
  {id:"7700518823",label:"Platine Fixation Amortisseur", cli:"RNT",bucket:"week",famille:"Suspension", pn:"RNT-SU-0821"},
  {id:"7700641047",label:"Crochet Remorquage Avant",     cli:"RNT",bucket:"week",famille:"Châssis",    pn:"RNT-CH-6610"},
  {id:"9807345210",label:"Bras de Liaison Arrière G/D",  cli:"STL",bucket:"week",famille:"Liaison",    pn:"PSA-LI-3421"},
  {id:"9807412088",label:"Bracket Boîte Vitesses",       cli:"STL",bucket:"day", famille:"Transmission",pn:"PSA-TR-4120"},
  {id:"9807523661",label:"Support Train Arrière",        cli:"STL",bucket:"week",famille:"Liaison",    pn:"PSA-LI-5236"},
  {id:"VL8834210", label:"Bride Collecteur Échappement", cli:"VLO",bucket:"week",famille:"Thermique",  pn:"VAL-TH-8834"},
  {id:"VL8901447", label:"Support Refroidisseur Huile",  cli:"VLO",bucket:"week",famille:"Thermique",  pn:"VAL-TH-9014"},
];

const WEEKS=["S1","S2","S3","S4","S5","S6","S7","S8","S9","S10","S11","S12"];
const Z_TABLE={50:0,55:0.13,60:0.25,65:0.39,70:0.52,75:0.67,80:0.84,85:1.04,90:1.28,91:1.34,92:1.41,93:1.48,94:1.55,95:1.65,96:1.75,97:1.88,98:2.05,99:2.33,99.5:2.58,99.9:3.09};

const BASE_VOL={
  "Châssis":    [820,840,780,860,810,790,830,850,800,820,840,810],
  "Suspension": [640,620,650,630,660,640,620,650,630,640,660,630],
  "Liaison":    [520,540,510,530,550,520,540,510,530,520,540,510],
  "Transmission":[1200,1150,1250,1180,1220,1190,1230,1200,1180,1210,1240,1190],
  "Thermique":  [380,390,370,400,385,375,395,380,390,370,400,385],
};

const SS_DATA={
  "7700432156":{ss:450,prix:12.5},  "7700518823":{ss:280,prix:8.9},
  "7700641047":{ss:320,prix:6.2},   "9807345210":{ss:380,prix:18.4},
  "9807412088":{ss:1200,prix:4.1},  "9807523661":{ss:290,prix:15.6},
  "VL8834210": {ss:180,prix:9.8},   "VL8901447": {ss:240,prix:11.2},
};

const DEFAULT_CFG={ts:{frozen:2,slushy:3,liquid:4},service:95,biasWarn:10,biasDanger:25};

// ── MATH ──────────────────────────────────────────────────
function rng(s){let x=Math.sin(s)*10000;return x-Math.floor(x);}
function getZone(w){const i=parseInt(w.replace("S",""));return i<=2?"frozen":i<=5?"slushy":"liquid";}

function buildEDI(seed,reception,famille){
  const base=BASE_VOL[famille]||BASE_VOL["Châssis"];
  const qtys={};
  WEEKS.forEach((w,i)=>{
    let drift=1;
    if(reception>3){
      const z=getZone(w);
      if(z==="frozen")      drift=1+(reception-3)*0.09+rng(seed+reception+i)*0.04;
      else if(z==="slushy") drift=1+(reception-3)*0.03;
      else                  drift=1-(reception-3)*0.04+rng(seed+i)*0.03;
    }
    qtys[w]=Math.max(0,Math.round(base[i]*drift*(0.94+rng(seed+reception*11+i)*0.12)));
  });
  const d=new Date(2024,reception-1,1);
  return{id:`R${String(reception).padStart(2,"0")}`,date:d.toLocaleDateString("fr-FR"),qtys};
}

function buildAllEDI(){
  const h={};
  ITEMS.forEach((it,idx)=>{h[it.id]=[];for(let r=1;r<=6;r++)h[it.id].push(buildEDI((idx+1)*17,r,it.famille));});
  return h;
}

function calcZone(last,prev,weeks){
  const errors=weeks.map(w=>(last.qtys[w]||0)-(prev.qtys[w]||0));
  const n=errors.length;
  const cum=errors.reduce((a,b)=>a+b,0);
  const mean=cum/n;
  const mad=errors.reduce((a,b)=>a+Math.abs(b),0)/n;
  const prevMean=weeks.map(w=>prev.qtys[w]||0).reduce((a,b)=>a+b,0)/n;
  const biasPct=prevMean>0?Math.round(mean/prevMean*1000)/10:0;
  const ts=mad>0?Math.round(cum/mad*100)/100:0;
  return{cum:Math.round(cum),mean:Math.round(mean*10)/10,biasPct,mad:Math.round(mad),ts,
    prevMean:Math.round(prevMean),direction:cum>0?"Sur-programmé":"Sous-programmé"};
}

function calcMetrics(recs,cfg){
  if(recs.length<2)return null;
  const last=recs[recs.length-1],prev=recs[recs.length-2];
  const zones={frozen:WEEKS.filter(w=>getZone(w)==="frozen"),
               slushy:WEEKS.filter(w=>getZone(w)==="slushy"),
               liquid:WEEKS.filter(w=>getZone(w)==="liquid")};
  const r={};
  Object.entries(zones).forEach(([z,wks])=>{
    const v=calcZone(last,prev,wks);
    r[z]={...v,thresh:cfg.ts[z],
      tsFlag:Math.abs(v.ts)>cfg.ts[z],
      biasFlag:Math.abs(v.biasPct)>cfg.biasDanger,
      flag:Math.abs(v.ts)>cfg.ts[z]||Math.abs(v.biasPct)>cfg.biasDanger};
  });
  return r;
}

function calcSS(mad,sl){return Math.round((Z_TABLE[sl]||1.65)*mad);}

function avgMadFromMetrics(m){
  if(!m)return 0;
  return Math.round((m.frozen.mad+m.slushy.mad+m.liquid.mad)/3);
}

function detectGaps(rec){
  return WEEKS.filter(w=>!rec.qtys[w]||rec.qtys[w]===0);
}

function classifyDemand(recs){
  if(!recs.length)return{type:"N/A",color:C.muted};
  const q=WEEKS.map(w=>recs[recs.length-1].qtys[w]||0);
  const mean=q.reduce((a,b)=>a+b,0)/q.length;
  const cv=mean>0?Math.sqrt(q.reduce((a,b)=>a+(b-mean)**2,0)/q.length)/mean:0;
  const trend=q[q.length-1]-q[0];
  if(cv<0.2&&Math.abs(trend)<mean*0.1)return{type:"Stable",color:C.ok};
  if(Math.abs(trend)>mean*0.3)return{type:trend>0?"Tendance ↑":"Tendance ↓",color:C.accent};
  if(Math.max(...q)/(Math.min(...q)||1)>1.5)return{type:"Saisonnière",color:C.warn};
  return{type:"Aléatoire",color:C.danger};
}

function clientScore(clientId,ediData,cfg){
  const items=ITEMS.filter(i=>i.cli===clientId);
  let total=0,flags=0;
  items.forEach(it=>{
    const m=calcMetrics(ediData[it.id],cfg);
    if(!m)return;
    Object.values(m).forEach(v=>{total++;if(v.flag)flags++;});
  });
  return total>0?Math.round((1-flags/total)*100):100;
}

// ── STATE ──────────────────────────────────────────────────
let EDI_DATA=buildAllEDI();
let CFG={"RNT":{...DEFAULT_CFG},"STL":{...DEFAULT_CFG,service:98},"VLO":{...DEFAULT_CFG,biasWarn:8}};
let SS=JSON.parse(JSON.stringify(SS_DATA));

let S={
  step:"home",       // home | import | verify | alerts | analyse | client | share
  importedFiles:[],
  lastImport:null,
  importResult:null,
  selectedItem:ITEMS[0].id,
  selectedClient:"RNT",
  searchQuery:"",
  searchClientFilter:"all",
  alertFilter:"all",  // all | frozen | slushy | liquid
  showHelp:false,
  lang:"fr",
  toast:null,
};

function go(step,extra={}){Object.assign(S,{step,...extra});render();}
function update(patch){Object.assign(S,patch);render();}

function showToast(msg,icon="ti-circle-check",ms=3000){
  S.toast={msg,icon};render();
  setTimeout(()=>{S.toast=null;render();},ms);
}

// ── COMPUTED ──────────────────────────────────────────────
function getAllAlerts(){
  const alerts=[];
  ITEMS.forEach(it=>{
    const cfg=CFG[it.cli]||DEFAULT_CFG;
    const m=calcMetrics(EDI_DATA[it.id],cfg);
    if(!m)return;
    const recs=EDI_DATA[it.id];
    const gaps=detectGaps(recs[recs.length-1]);
    Object.entries(m).forEach(([z,v])=>{
      if(v.flag)alerts.push({item:it,zone:z,...v,type:"drift"});
    });
    if(gaps.length>0)alerts.push({item:it,zone:"gap",gaps,type:"gap",flag:true});
  });
  return alerts;
}

function getLastImportDate(){
  let latest=null;
  ITEMS.forEach(it=>{
    const recs=EDI_DATA[it.id];
    if(recs.length){
      const d=recs[recs.length-1].date;
      if(!latest||d>latest)latest=d;
    }
  });
  return latest;
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML=renderTopBar()+renderStepsBar()+
    `<div class="main">${renderStep()}</div>`+
    (S.toast?renderToast():"")+
    renderHelpModal();
  attachEvents();
}

// ── TOPBAR ────────────────────────────────────────────────
function renderTopBar(){
  return`<div class="topbar">
    <span class="logo-text">OPTI<span class="logo-accent">PLAN</span></span>
    <div class="topbar-sep"></div>
    <span style="color:#94a3b8;font-size:12px">Demand Governance · Module 1</span>
    <div class="topbar-right">
      <button class="topbar-btn${S.showHelp?" active":""}" onclick="update({showHelp:!S.showHelp})">
        <i class="ti ti-book-2"></i> APICS Help
      </button>
      <button class="topbar-btn" onclick="showEmailModal()">
        <i class="ti ti-mail-forward"></i> Partager
      </button>
      <div style="width:32px;height:32px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:13px;font-weight:700">
        ADV
      </div>
    </div>
  </div>`;
}

// ── STEPS BAR ─────────────────────────────────────────────
function renderStepsBar(){
  const alerts=getAllAlerts();
  const steps=[
    {id:"home",    icon:"ti-home-2",       label:"Accueil"},
    {id:"import",  icon:"ti-upload",        label:"1 · Importer EDI"},
    {id:"verify",  icon:"ti-clipboard-check",label:"2 · Vérifier"},
    {id:"alerts",  icon:"ti-alert-triangle",label:`3 · Alertes${alerts.length>0?" ("+alerts.length+")":""}`,hasAlert:alerts.length>0},
    {id:"analyse", icon:"ti-zoom-in",       label:"4 · Analyser"},
    {id:"client",  icon:"ti-building-factory-2",label:"5 · Vue Client T1"},
    {id:"share",   icon:"ti-share",         label:"6 · Partager"},
  ];
  return`<div class="steps-bar">
    ${steps.map((st,i)=>{
      const isActive=S.step===st.id;
      const isDone=S.importResult&&["verify","alerts","analyse","client","share"].includes(st.id)&&!isActive;
      const cls=isActive?"active":st.hasAlert?"alert":isDone?"done":"";
      return(i>0?`<span class="step-arrow">›</span>`:"")
        +`<div class="step-item ${cls}" onclick="go('${st.id}')">
          <div class="step-num">${st.hasAlert?"!":i+1}</div>
          <i class="ti ${st.icon}" style="font-size:14px"></i>
          ${st.label}
        </div>`;
    }).join("")}
  </div>`;
}

// ── HOME ──────────────────────────────────────────────────
function renderHome(){
  const alerts=getAllAlerts();
  const lastDate=getLastImportDate();
  const lastRec=EDI_DATA[ITEMS[0].id];
  const lastId=lastRec.length?lastRec[lastRec.length-1].id:"—";

  return`
  <!-- ACCUEIL HERO -->
  <div class="card mb-16" style="background:linear-gradient(135deg,#0B1F3A 60%,#1A4A8A);color:#fff;border:none">
    <div class="flex-between">
      <div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">
          Bonjour — ${new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}
        </div>

// ── STEP 4: ANALYSE ───────────────────────────────────────
function renderAnalyse(){
  const it=ITEMS.find(i=>i.id===S.selectedItem)||ITEMS[0];
  const cfg=CFG[it.cli]||DEFAULT_CFG;
  const recs=EDI_DATA[it.id];
  const m=calcMetrics(recs,cfg);
  const p=classifyDemand(recs);
  const cl=CLIENTS.find(c=>c.id===it.cli);
  const avgMad=avgMadFromMetrics(m);
  const ss=calcSS(avgMad,cfg.service);
  const ssAct=SS[it.id]?.ss||0;
  const gap=ss-ssAct;
  const last=recs[recs.length-1];
  const prev=recs[recs.length-2];

  // SVG Graphe
  const svgW=600,svgH=180,pL=40,pR=10,pT=14,pB=24;
  const pw=svgW-pL-pR,ph=svgH-pT-pB;
  const maxQ=Math.max(...recs.flatMap(r=>WEEKS.map(w=>r.qtys[w]||0)),1);
  const LCOLORS=["#CBD5E1","#94A3B8","#60A5FA","#00A8E8","#00C9B1","#1A4A8A"];
  function px(i){return pL+i/(WEEKS.length-1)*pw;}
  function py(v){return pT+ph-(v/maxQ)*ph;}
  const gridLines=[0,.25,.5,.75,1].map(p=>{
    const y=pT+ph*(1-p);
    return`<line x1="${pL}" x2="${svgW-pR}" y1="${y}" y2="${y}" stroke="#F1F5F9" stroke-width="1"/>
    <text x="${pL-4}" y="${y+3}" text-anchor="end" font-size="8" fill="#94A3B8">${Math.round(maxQ*p)}</text>`;
  }).join("");
  const xFrz=px(2),xSlu=px(5);
  const lines_svg=recs.map((r,ri)=>{
    const pts=WEEKS.map((w,wi)=>`${px(wi)},${py(r.qtys[w]||0)}`).join(" ");
    const isLast=ri===recs.length-1;
    return`<polyline points="${pts}" fill="none" stroke="${LCOLORS[ri]}" stroke-width="${isLast?2.5:1.2}" stroke-opacity="${isLast?1:0.5}" stroke-linejoin="round"/>`;
  }).join("");
  const wLabels=WEEKS.map((w,i)=>`<text x="${px(i)}" y="${svgH-4}" text-anchor="middle" font-size="8" fill="#94A3B8">${w}</text>`).join("");

  return`
  <!-- SÉLECTEUR ARTICLE -->
  <div class="card mb-16">
    <div class="flex-between mb-8">
      <div class="card-title">Sélectionner une référence</div>
      <div class="search-box" style="width:300px">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Rechercher..." id="analyseSearch" 
          oninput="update({searchQuery:this.value})" value="${S.searchQuery}">
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">

      ${["frozen","slushy","liquid"].map(z=>{
        const wks=WEEKS.filter(w=>getZone(w)===z);
        const errs=last&&prev?wks.map(w=>Math.abs((last.qtys[w]||0)-(prev.qtys[w]||0))):[];
        const mad=errs.length?Math.round(errs.reduce((a,b)=>a+b,0)/errs.length):0;
        const meanD=last?Math.round(wks.map(w=>last.qtys[w]||0).reduce((a,b)=>a+b,0)/wks.length):0;
        const cv=meanD>0?Math.round(mad/meanD*1000)/10:0;
        const cvColor=cv>30?C.danger:cv>15?C.warn:C.ok;
        const zLabel=z==="frozen"?"Zone Figée":z==="slushy"?"Zone Semi-figée":"Zone Flexible";
        const zColor=z==="frozen"?C.accent:z==="slushy"?C.warn:C.teal;

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">

              <div style="font-size:20px;font-weight:800;color:${cvColor}">${cv}%</div>
              <div style="font-size:10px;color:#64748B">CV · Variabilité</div>
            </div>
          </div>
          <div class="pbar mt-8">
            <div class="pbar-fill" style="width:${Math.min(cv,100)}%;background:${cvColor}"></div>
          </div>
        </div>`;
      }).join("")}
      <div style="font-size:10px;color:#64748B;margin-top:6px">CV > 30% = demande aléatoire · CV < 15% = demande stable</div>
    </div>

  <!-- MÉTRIQUES DÉTAILLÉES -->
  <div class="card mb-16">
    <div class="card-title mb-16">Biais & Tracking Signal — Dernière réception vs t-1</div>

      ${m?Object.entries(m).map(([z,v])=>{
        const pct=Math.min(Math.abs(v.ts)/v.thresh,1);
        const col=pct<0.6?C.ok:pct<1?C.warn:C.danger;
        const zL=z==="frozen"?"Zone Figée":z==="slushy"?"Zone Semi-figée":"Zone Flexible";
        const zC=z==="frozen"?C.accent:z==="slushy"?C.warn:C.teal;
        return`<div style="border:1.5px solid ${v.flag?C.danger:"#E2E8F0"};border-radius:10px;padding:14px;background:${v.flag?"#FFF5F5":"#fff"}">
          <div class="flex-between mb-10">
            <span class="zone-chip zone-${z}">${zL}</span>
            ${v.flag?`<span class="badge badge-danger">Alerte</span>`:`<span class="badge badge-ok">OK</span>`}
          </div>
          <div style="background:#F8FAFC;border-radius:8px;padding:10px;margin-bottom:10px">
            <div style="font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;margin-bottom:8px">Biais du programme</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">
              ${[
                {l:"Cumulé",v:(v.cum>0?"+":"")+v.cum},
                {l:"Moy./semaine",v:(v.mean>0?"+":"")+v.mean},
                {l:"% prog. reçu",v:(v.biasPct>0?"+":"")+v.biasPct+"%",hl:true},
              ].map(k=>`<div style="text-align:center">
                <div style="font-size:9px;color:#64748B">${k.l}</div>
                <div style="font-size:15px;font-weight:700;color:${k.hl?(v.biasFlag?C.danger:C.ok):v.cum>0?C.danger:C.ok}">${k.v}</div>
              </div>`).join("")}
            </div>
            <div style="display:flex;gap:6px;justify-content:center">
              <span class="badge ${v.biasFlag?"badge-danger":"badge-ok"}">${Math.abs(v.biasPct)<(CFG[it.cli]||DEFAULT_CFG).biasWarn?"Biais faible":Math.abs(v.biasPct)<(CFG[it.cli]||DEFAULT_CFG).biasDanger?"Biais modéré":"Biais fort"}</span>
              <span class="badge badge-neutral">${v.direction}</span>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-bottom:10px">
            <div style="flex:1;text-align:center">
              <div style="font-size:10px;color:#64748B;margin-bottom:2px">MAD</div>
              <div style="font-size:20px;font-weight:800">${v.mad}</div>
            </div>
            <div style="flex:1;text-align:center;border-left:1px solid #E2E8F0">
              <div style="font-size:10px;color:#64748B;margin-bottom:2px">Tracking Signal</div>
              <div style="font-size:20px;font-weight:800;color:${v.tsFlag?C.danger:"#1E293B"}">${v.ts}</div>
            </div>
          </div>
          <div style="font-size:9px;color:#64748B;margin-bottom:3px;display:flex;justify-content:space-between">
            <span>TS</span><span style="color:${col};font-weight:700">${v.ts} / seuil ±${v.thresh}</span>
          </div>
          <div class="pbar"><div class="pbar-fill" style="width:${pct*100}%;background:${col}"></div></div>
        </div>`;
      }).join(""):"<div style='color:#64748B'>Minimum 2 réceptions requises</div>"}
    </div>
  </div>

  <!-- HISTORIQUE TIMELINE -->
  <div class="card">
    <div class="card-title mb-16">Historique des réceptions EDI</div>
    <div class="timeline">
      ${[...recs].reverse().map((r,i)=>{
        const isLatest=i===0;
        const prevR=i<recs.length-1?[...recs].reverse()[i+1]:null;
        let biasPct="—",tsF="—",statusBadge=`<span class="badge badge-neutral">Référence</span>`;
        if(prevR){
          const b=calcZone(r,prevR,WEEKS);
          biasPct=(b.biasPct>0?"+":"")+b.biasPct+"%";
          tsF=b.ts;
          const cfg2=CFG[it.cli]||DEFAULT_CFG;
          const flag=Math.abs(b.ts)>cfg2.ts.frozen||Math.abs(b.biasPct)>cfg2.biasDanger;

            ${statusBadge}
          </div>
          ${!isLatest?`<div style="font-size:11px;color:#64748B;margin-top:4px">
            Biais : <strong>${biasPct}</strong> · TS Figé : <strong>${tsF}</strong>
          </div>`:""}
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

// ── STEP 5: CLIENT T1 ─────────────────────────────────────
function renderClient(){
  const cl=CLIENTS.find(c=>c.id===S.selectedClient);
  const cfg=CFG[S.selectedClient]||DEFAULT_CFG;
  const clientItems=ITEMS.filter(i=>i.cli===S.selectedClient);
  const score=clientScore(S.selectedClient,EDI_DATA,cfg);
  const scoreColor=score>=85?C.ok:score>=65?C.warn:C.danger;
  const allMetrics=clientItems.map(it=>({it,m:calcMetrics(EDI_DATA[it.id],cfg)}));
  const totalAlerts=allMetrics.filter(({m})=>m&&Object.values(m).some(v=>v.flag)).length;
  const avgBias=Math.round(allMetrics.reduce((a,{m})=>a+(m?Math.abs(m.frozen.biasPct):0),0)/allMetrics.length*10)/10;
  const stableCount=allMetrics.filter(({it})=>classifyDemand(EDI_DATA[it.id]).type==="Stable").length;

  return`
  <!-- SÉLECTEUR CLIENT -->
  <div class="flex gap-8 mb-16">
    ${CLIENTS.map(c=>`<button onclick="update({selectedClient:'${c.id}'})" style="
      background:${S.selectedClient===c.id?c.color:"#fff"};
      color:${S.selectedClient===c.id?"#fff":"#1E293B"};
      border:2px solid ${S.selectedClient===c.id?c.color:"#E2E8F0"};
      border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700">
      ${c.label}
    </button>`).join("")}
  </div>

  <!-- HEADER CLIENT -->
  <div class="card mb-16" style="background:#0B1F3A;border:none;color:#fff">
    <div class="flex-between">
      <div>
        <div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Revue qualité EDI — Écran réunion</div>
        <div style="font-size:24px;font-weight:800" style="color:${cl.color}">${cl.label}</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:4px">${clientItems.length} références suivies · Programme ${cl.freq}</div>
      </div>
      <div class="flex gap-8" style="align-items:center">
        <div style="text-align:center">
          <div class="score-ring" style="border-color:${scoreColor}">
            <div style="font-size:22px;font-weight:900;color:${scoreColor}">${score}</div>
            <div style="font-size:9px;color:#94a3b8">/100</div>
          </div>
          <div style="font-size:10px;color:#94a3b8;margin-top:4px">Score qualité</div>
        </div>
        ${[
          {l:"Alertes",v:totalAlerts,c:totalAlerts>0?C.danger:C.ok},
          {l:"Biais moy.",v:avgBias+"%",c:avgBias>cfg.biasDanger?C.danger:avgBias>cfg.biasWarn?C.warn:C.ok},
          {l:"Réf. stables",v:`${stableCount}/${clientItems.length}`,c:C.teal},
        ].map(k=>`<div style="background:#1e3a5f;border-radius:10px;padding:10px 16px;text-align:center">
          <div style="font-size:20px;font-weight:800;color:${k.c}">${k.v}</div>
          <div style="font-size:10px;color:#94a3b8;margin-top:2px">${k.l}</div>
        </div>`).join("")}
      </div>
    </div>
  </div>

  <div class="grid-2 mb-16">
    <!-- TABLEAU BIAIS -->
    <div class="card">
      <div class="card-title mb-16">Biais par référence</div>
      <table class="tbl">
        <thead><tr><th>Référence</th><th>Figé</th><th>Semi-figé</th><th>Flexible</th><th>Direction</th></tr></thead>
        <tbody>
          ${allMetrics.map(({it,m})=>{
            if(!m)return`<tr><td colspan="5" style="color:#64748B">—</td></tr>`;
            const avgBp=Math.round((Math.abs(m.frozen.biasPct)+Math.abs(m.slushy.biasPct)+Math.abs(m.liquid.biasPct))/3*10)/10;
            return`<tr>
              <td style="font-family:monospace;font-size:11px;font-weight:700;color:${C.blue}">${it.id}</td>
              ${["frozen","slushy","liquid"].map(z=>{
                const v=m[z];
                const c=v.biasFlag?C.danger:v.biasPct>cfg.biasWarn?C.warn:C.ok;
                return`<td style="font-weight:700;color:${c};font-size:12px">${v.biasPct>0?"+":""}${v.biasPct}%</td>`;
              }).join("")}
              <td><span class="badge ${m.frozen.cum>0?"badge-warn":"badge-info"}" style="font-size:10px">${m.frozen.direction}</span></td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
      <div style="font-size:10px;color:#64748B;margin-top:8px;padding:6px 8px;background:#F8FAFC;border-radius:6px">
        Seuils configurés · Avert. ${cfg.biasWarn}% · Danger ${cfg.biasDanger}%
      </div>

    <!-- ARGUMENTS NÉGOCIATION -->
    <div class="card">
      <div class="card-title mb-4">Arguments de négociation</div>

      ${allMetrics.filter(({m})=>m&&Object.values(m).some(v=>v.flag)).length===0
        ?`<div style="text-align:center;padding:24px;color:#64748B">
            <i class="ti ti-mood-happy" style="font-size:36px;color:${C.ok};display:block;margin-bottom:8px"></i>

            <div class="text-sm text-muted">Score qualité EDI satisfaisant</div>
          </div>`
        :allMetrics.filter(({m})=>m&&Object.values(m).some(v=>v.flag)).map(({it,m})=>{
          const dom=Object.entries(m).filter(([,v])=>v.flag).map(([z])=>z==="frozen"?"Figé":z==="slushy"?"Semi-figé":"Flexible").join(", ");
          const dir=m.frozen.direction;
          const avgBp=Math.round((Math.abs(m.frozen.biasPct)+Math.abs(m.slushy.biasPct)+Math.abs(m.liquid.biasPct))/3*10)/10;
          return`<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:10px 12px;margin-bottom:8px">
            <div style="font-size:12px;font-weight:700;margin-bottom:4px">${it.id} — ${it.label}</div>
            <div style="font-size:11px;color:#64748B;line-height:1.6">
              Biais moyen <strong style="color:${C.warn}">${avgBp}%</strong> · Zone(s) : <strong>${dom}</strong> · Tendance : <strong>${dir}</strong>
              <br>→ Risque ${dir==="Sur-programmé"?"surstock et immobilisation de capital":"rupture et transport exceptionnel"}
            </div>
          </div>`;
        }).join("")}
    </div>
  </div>

  <!-- TABLEAU TS ── -->
  <div class="card">
    <div class="card-title mb-16">Tracking Signal — Stabilité des programmes par référence</div>
    <table class="tbl">
      <thead><tr><th>Référence</th><th>Désignation</th><th>TS Zone Figée</th><th>TS Semi-figée</th><th>TS Flexible</th><th>Typolo.</th><th>Statut global</th></tr></thead>
      <tbody>
        ${allMetrics.map(({it,m})=>{
          const p=classifyDemand(EDI_DATA[it.id]);
          const hasFlag=m&&Object.values(m).some(v=>v.flag);

          return`<tr class="${hasFlag?"alert-row":""}">
            <td style="font-family:monospace;font-size:11px;font-weight:700;color:${C.blue}">${it.id}</td>
            <td style="font-size:12px">${it.label}</td>
            ${m?["frozen","slushy","liquid"].map(z=>`<td style="font-weight:700;font-size:12px;color:${m[z].tsFlag?C.danger:C.ok}">
              ${m[z].ts} ${m[z].tsFlag?"🚨":"✓"} <span style="font-size:10px;color:#94A3B8">/±${m[z].thresh}</span>
            </td>`).join(""):["","",""].map(()=>`<td>—</td>`).join("")}
            <td><span class="badge badge-neutral" style="color:${p.color};background:${p.color}18">${p.type}</span></td>
            <td><span class="badge ${hasFlag?"badge-danger":"badge-ok"}">${hasFlag?"⚠ Alerte":"✓ OK"}</span></td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

// ── HELP MODAL ────────────────────────────────────────────
const APICS=[
  {term:"Biais (Bias)",def:"Biais% = Biais moyen / Moyenne programme reçu × 100. Un biais positif = sur-programmation chronique → risque surstock. Négatif = sous-programmation → risque rupture."},
  {term:"MAD — Déviation Absolue Moyenne",def:"MAD = Σ|Δ programme| / n. Mesure la variabilité du programme EDI. Base de calcul du Safety Stock : SS = Z × MAD."},
  {term:"Tracking Signal",def:"TS = Biais Cumulé / MAD. Seuils APICS : Figé ±2, Semi-figé ±3, Flexible ±4. Si |TS| > seuil → dérive significative → alerte."},
  {term:"Zone Figée (Frozen)",def:"S1-S2. Programme quasi-définitif. Toute modification impacte la production en cours. Seuil TS : ±2. Impact immédiat sur les confirmations de commande."},
  {term:"Zone Semi-figée (Slushy)",def:"S3-S5. Modifications possibles mais avec impact capacitaire. Affecte le PDP et le calcul MRP. Seuil TS : ±3."},
  {term:"Zone Flexible (Liquid)",def:"S6+. Flexibilité maximale. Les changements sont attendus. Impact sur les approvisionnements long terme. Seuil TS : ±4."},
  {term:"Safety Stock — Formule EGBS",def:"SS = Z × MAD. Z (coefficient de service) : 90%→1.28, 95%→1.65, 98%→2.05, 99%→2.33. Un MAD élevé = SS plus important nécessaire."},
  {term:"CV — Coefficient de Variation",def:"CV = MAD / Demande moyenne × 100. CV < 15% = demande stable. 15-30% = variable. > 30% = aléatoire → envisager Croston/SBA pour le forecast."},
];

// ── CSV PARSE ─────────────────────────────────────────────
function parseEDI(text,fileName){
  const lines=text.split(/\r?\n/).filter(l=>l.trim()&&l.replace(/;/g,"").trim());
  const meta={};let hi=-1,cols=[],periods=[],bucket="week",rows=[];
  lines.forEach((line,i)=>{
    const cells=line.split(";").map(c=>c.trim().replace(/^\uFEFF/,"").replace(/"/g,""));
    const k=cells[0].toUpperCase();
    if(k==="EMETTEUR")meta.emetteur=cells[1];
    else if(k==="DATE_EMISSION")meta.date=cells[1];
    else if(k==="RECEPTION_NUM")meta.reception=cells[1];
    else if(k==="REFERENCE"){hi=i;cols=cells;periods=cols.filter(c=>c.match(/^S\d+$|^\d{2}\/\d{2}$/));bucket=periods[0]?.match(/^\d{2}\/\d{2}$/)?"day":"week";}
    else if(hi>-1&&cells[0].match(/^[A-Z0-9]/)){
      const row={};cols.forEach((c,j)=>{row[c]=cells[j]||"";});
      row._qtys={};periods.forEach(p=>{row._qtys[p]=parseInt(row[p])||0;});
      row._periods=periods;row._bucket=bucket;rows.push(row);
    }
  });
  return{meta,rows,periods,bucket,fileName,valid:rows.length>0};
}

function parseMaster(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const r={};
  lines.forEach((l,i)=>{if(i===0)return;const c=l.split(";").map(x=>x.trim());if(c[0]&&c[1])r[c[0]]={ss:parseInt(c[1])||0,uom:c[2]||"PCS"};});
  return r;
}

// ── IMPORT HANDLERS ───────────────────────────────────────
let pendingFiles=[];

function handleEDIFiles(files){
  pendingFiles=[...files].map(f=>new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>res(parseEDI(e.target.result,f.name));
    r.readAsText(f,"utf-8");
  }));
  Promise.all(pendingFiles).then(parsed=>{
    S.importedFiles=parsed;
    const el=document.getElementById("ediFileList");
    if(el)el.innerHTML=parsed.map(p=>`<div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 10px;background:#F8FAFC;border-radius:8px;border:1px solid ${p.valid?"#D1FAE5":"#FEE2E2"}">
      <i class="ti ti-file-spreadsheet" style="color:${p.valid?C.ok:C.danger}"></i>
      <span style="flex:1;font-size:12px;font-weight:600">${p.fileName}</span>
      <span style="font-size:11px;color:#64748B">${p.rows.length} réf. · ${p.periods.length} pér.</span>
      <span class="badge ${p.valid?"badge-ok":"badge-danger"}">${p.valid?"✓ Valide":"⚠ Erreur"}</span>
    </div>`).join("");
    const prev=document.getElementById("importPreview");
    if(prev)prev.innerHTML=`<div class="card-sm" style="background:#EFF9FF;border-color:#BAE6FD">
      <div style="font-size:12px;font-weight:700;color:${C.accent}"><i class="ti ti-eye" style="margin-right:5px"></i>Aperçu · ${parsed.length} fichier(s) · ${parsed.reduce((a,f)=>a+f.rows.length,0)} références</div>
      ${parsed.map(f=>`<div style="font-size:11px;color:#64748B;margin-top:4px">${f.fileName} · Réception ${f.meta.reception||"?"} · ${f.meta.date||""} · ${f.rows.length} réf.</div>`).join("")}
    </div>`;
    const btn=document.getElementById("importActionBtn");
    if(btn)btn.style.display="block";
  });
}

function handleMasterFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const data=parseMaster(e.target.result);
    Object.assign(SS,data);
    const count=Object.keys(data).length;
    const el=document.getElementById("masterStatus");
    if(el)el.innerHTML=`<div class="badge badge-ok" style="padding:6px 10px"><i class="ti ti-circle-check" style="margin-right:4px"></i>${count} articles mis à jour</div>`;
    showToast(`${count} SS actuel importés`,"ti-package");
  };
  r.readAsText(file,"utf-8");
}

function doImport(){
  S.importedFiles.forEach(f=>{
    f.rows.forEach(row=>{
      const ref=row.REFERENCE;
      const it=ITEMS.find(i=>i.id===ref);
      if(!it)return;
      const recs=EDI_DATA[ref]||[];
      EDI_DATA[ref]=[...recs.slice(-5),{
        id:f.meta.reception||`R${String(recs.length+1).padStart(2,"0")}`,
        date:f.meta.date||new Date().toLocaleDateString("fr-FR"),
        qtys:row._qtys
      }];
    });
  });
  S.importedFiles=[];
  S.importResult=true;
  const btn=document.getElementById("importActionBtn");
  if(btn)btn.style.display="none";
  const suc=document.getElementById("importSuccessMsg");
  if(suc)suc.style.display="block";
  showToast("Import réalisé · Données mises à jour","ti-circle-check");
}

// ── EXPORT CSV ────────────────────────────────────────────
function exportCSV(){
  const alerts=getAllAlerts();
  const rows=[["Référence","Désignation","Client T1","Zone","Biais%","TS","Statut"]];
  ITEMS.forEach(it=>{
    const m=calcMetrics(EDI_DATA[it.id],CFG[it.cli]||DEFAULT_CFG);
    if(!m)return;
    const cl=CLIENTS.find(c=>c.id===it.cli);
    ["frozen","slushy","liquid"].forEach(z=>{
      rows.push([it.id,it.label,cl.label,z,m[z].biasPct+"%",m[z].ts,m[z].flag?"ALERTE":"OK"]);
    });
  });
  const csv=rows.map(r=>r.join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`OPTIPLAN_Rapport_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
  showToast("Fichier CSV exporté","ti-file-spreadsheet");
}

      <div><div class="modal-title">Partager l'analyse par email</div><div class="modal-sub">Le rapport sera envoyé via votre client email</div></div>

      <label style="font-size:11px;font-weight:700;color:#64748B;display:block;margin-bottom:4px">Objet</label>

function sendEmail(){
  const to=document.getElementById("emailTo").value;
  const subj=document.getElementById("emailSubj").value;
  const body=document.getElementById("emailBody").value;
  if(!to){alert("Veuillez renseigner un destinataire");return;}
  window.location.href=`mailto:${to}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  document.getElementById("emailModal").remove();
}

function showShareAlert(idx){
  const alerts=getAllAlerts();
  const a=alerts[idx];
  if(!a)return;
  const body=`Alerte OPTIPLAN\nRéférence : ${a.item.id} — ${a.item.label}\nZone : ${a.zone}\nTracking Signal : ${a.ts||"—"} (seuil ±${a.thresh||"—"})\nBiais : ${a.biasPct||"—"}%\nDirection : ${a.direction||"—"}\nAction requise : révision programme MPS`;
  window.location.href=`mailto:?subject=[OPTIPLAN] Alerte ${a.item.id}&body=${encodeURIComponent(body)}`;
}

// ── EVENTS ────────────────────────────────────────────────
function attachEvents(){
  const dz=document.getElementById("dropEDI");
  const fi=document.getElementById("fileEDI");
  if(dz){
    dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});
    dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));
    dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag");handleEDIFiles(e.dataTransfer.files);});
  }
  if(fi)fi.addEventListener("change",e=>handleEDIFiles(e.target.files));
  const dm=document.getElementById("dropMaster");
  const fm=document.getElementById("fileMaster");
  if(dm){
    dm.addEventListener("dragover",e=>{e.preventDefault();dm.classList.add("drag");});
    dm.addEventListener("dragleave",()=>dm.classList.remove("drag"));
    dm.addEventListener("drop",e=>{e.preventDefault();dm.classList.remove("drag");handleMasterFile(e.dataTransfer.files[0]);});
  }
  if(fm)fm.addEventListener("change",e=>handleMasterFile(e.target.files[0]));
}

render();
