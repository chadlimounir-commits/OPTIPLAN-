<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTIPLAN — Demand Governance v0.5</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F0F4F8;color:#1E293B;font-size:14px}
button{cursor:pointer;font-family:inherit;transition:all .15s}
input,select,textarea{font-family:inherit}

/* ── LAYOUT ── */
.topbar{background:#0B1F3A;height:52px;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px #0006}
.logo-text{font-size:18px;font-weight:900;color:#fff;letter-spacing:-0.5px}
.logo-accent{font-weight:300;color:#00A8E8;letter-spacing:2px}
.topbar-sep{width:1px;height:24px;background:#ffffff22}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.db-dot{width:8px;height:8px;border-radius:50%;background:#EF4444;flex-shrink:0}
.db-dot.connected{background:#10B981}

/* ── WORKFLOW STEPS ── */
.steps-bar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 20px;display:flex;align-items:center;gap:0;overflow-x:auto}
.step-item{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;color:#64748B;font-size:13px;font-weight:500}
.step-item.active{border-bottom-color:#00A8E8;color:#0B1F3A;font-weight:700}
.step-item.done{color:#10B981}
.step-item.alert{color:#EF4444}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#F1F5F9;color:#64748B;flex-shrink:0}
.step-item.active .step-num{background:#0B1F3A;color:#fff}
.step-item.done .step-num{background:#10B981;color:#fff}
.step-item.alert .step-num{background:#EF4444;color:#fff}
.step-arrow{color:#CBD5E1;font-size:18px;flex-shrink:0}

.main{padding:20px;max-width:1200px;margin:0 auto}

/* ── CARDS ── */
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px}
.card-sm{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px}
.card-title{font-size:14px;font-weight:700;color:#1E293B;margin-bottom:4px}
.card-sub{font-size:12px;color:#64748B;margin-bottom:16px}

/* ── STATUS BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.badge-ok{background:#D1FAE5;color:#065F46}
.badge-warn{background:#FEF3C7;color:#92400E}
.badge-danger{background:#FEE2E2;color:#991B1B}
.badge-info{background:#DBEAFE;color:#1E40AF}
.badge-neutral{background:#F1F5F9;color:#475569}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.btn-primary{background:#0B1F3A;color:#fff}
.btn-primary:hover{background:#1A3A5C}
.btn-accent{background:#00A8E8;color:#fff}
.btn-accent:hover{background:#0090C8}
.btn-success{background:#10B981;color:#fff}
.btn-danger{background:#EF4444;color:#fff}
.btn-ghost{background:none;border:1px solid #E2E8F0;color:#64748B}
.btn-ghost:hover{background:#F8FAFC}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:14px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── ALERT CARDS ── */
.alert-card{border-radius:10px;padding:14px 16px;border-left:4px solid;margin-bottom:10px;background:#fff;border-color:#E2E8F0;box-shadow:0 1px 3px #0001}
.alert-card.frozen{border-color:#EF4444;background:#FFF5F5}
.alert-card.slushy{border-color:#F59E0B;background:#FFFBEB}
.alert-card.liquid{border-color:#00C9B1;background:#F0FDFA}
.alert-card.gap{border-color:#8B5CF6;background:#F5F3FF}

/* ── SEARCH ── */
.search-box{display:flex;align-items:center;gap:8px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:8px 12px}
.search-box input{border:none;background:none;outline:none;font-size:13px;color:#1E293B;width:100%}
.search-box i{color:#94A3B8;font-size:16px}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748B;background:#F8FAFC;border-bottom:1px solid #E2E8F0}
.tbl td{padding:10px 12px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
.tbl tr:hover td{background:#F8FAFC}
.tbl tr.alert-row td{background:#FFF5F5}

/* ── KPI BOX ── */
.kpi{text-align:center;padding:14px;border-radius:10px;background:#F8FAFC;border:1px solid #E2E8F0}
.kpi-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748B}
.kpi-sub{font-size:10px;color:#94A3B8;margin-top:2px}

/* ── PROGRESS BAR ── */
.pbar{height:6px;background:#E2E8F0;border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s}

/* ── SCORE RING ── */
.score-ring{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:5px solid;flex-shrink:0}

/* ── ZONE CHIPS ── */
.zone-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.zone-frozen{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.zone-slushy{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A}
.zone-liquid{background:#F0FDFA;color:#0F766E;border:1px solid #99F6E4}

/* ── DROP ZONE ── */
.drop-zone{border:2px dashed #CBD5E1;border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#F8FAFC}
.drop-zone:hover,.drop-zone.drag{border-color:#00A8E8;background:#EFF9FF}

/* ── TOPBAR BUTTONS ── */
.topbar-btn{background:#1e3a5f;border:none;color:#94a3b8;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.topbar-btn:hover{background:#2a4a6f;color:#fff}
.topbar-btn.active{background:#00A8E833;color:#00A8E8}

/* ── MODAL ── */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:28px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #0004}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:#64748B;margin-bottom:20px}

/* ── HISTORY TIMELINE ── */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:#E2E8F0}
.timeline-item{position:relative;padding-bottom:16px;padding-left:16px}
.timeline-item::before{content:'';position:absolute;left:-14px;top:4px;width:10px;height:10px;border-radius:50%;background:#CBD5E1;border:2px solid #fff}
.timeline-item.latest::before{background:#00A8E8}
.timeline-item.alert::before{background:#EF4444}

/* ── NOTIFICATION TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:#0B1F3A;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px #0004;z-index:9999;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── LOADER ── */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0B1F3Acc;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff}
.loading-overlay .spinner{width:40px;height:40px;border-width:3px}

/* ── RESPONSIVE ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.flex{display:flex;align-items:center;gap:12px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap-8{gap:8px}
.gap-4{gap:4px}
.mt-4{margin-top:4px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.text-sm{font-size:12px}
.text-xs{font-size:10px}
.text-muted{color:#64748B}
.text-danger{color:#EF4444}
.text-ok{color:#10B981}
.text-warn{color:#F59E0B}
.fw-700{font-weight:700}

@media(max-width:768px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .steps-bar{gap:0}
  .step-item{padding:10px 12px;font-size:11px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ════════════════════════════════════════════════════════════
// OPTIPLAN — Demand Governance v0.5
// Frontend connecté base de données OPTIPLAN via API
// EGBS © 2024
// ════════════════════════════════════════════════════════════

// ── DB CONFIG ─────────────────────────────────────────────
// URL câblée — peut être surchargée via le panneau Config
const GAS_URL_DEFAULT = "https://script.google.com/macros/s/AKfycbwZGbBc9YQPx568MoOy8sUH4eYCRshkQeGei1rWOtor-HHeYpf93EQbev3gNGC3F7n5MA/exec";

// ── CONSTANTS ──────────────────────────────────────────────
const C={
  navy:"#0B1F3A",blue:"#1A4A8A",accent:"#00A8E8",teal:"#00C9B1",
  warn:"#F59E0B",danger:"#EF4444",ok:"#10B981",muted:"#64748B"
};

const WEEKS=["S1","S2","S3","S4","S5","S6","S7","S8","S9","S10","S11","S12"];
const Z_TABLE={50:0,55:0.13,60:0.25,65:0.39,70:0.52,75:0.67,80:0.84,85:1.04,90:1.28,91:1.34,92:1.41,93:1.48,94:1.55,95:1.65,96:1.75,97:1.88,98:2.05,99:2.33,99.5:2.58,99.9:3.09};

const DEFAULT_CFG={ts:{frozen:2,slushy:3,liquid:4},service:95,biasWarn:10,biasDanger:25};

// ── STATE ─────────────────────────────────────────────────
let GAS_URL = localStorage.getItem("optiplan_gas_url") || GAS_URL_DEFAULT;
let GS_CONNECTED = false;
let GS_LOADING = false;

// Données chargées depuis la base de données
let CLIENTS = [];
let ITEMS   = [];
let EDI_DATA= {};  // { refId: [{id, date, qtys:{S1..S12}}, ...] }
let CFG     = {};  // { clientId: { ts:{frozen,slushy,liquid}, biasWarn, biasDanger, service } }
let SS      = {};  // { refId: { ss, uom } }
let ALERTS_CACHE = null; // cache invalidé à chaque action

let S={
  step:"home",
  importedFiles:[],
  importResult:false,
  selectedItem:null,
  selectedClient:null,
  searchQuery:"",
  alertFilter:"all",
  showHelp:false,
  showConfig:false,
  toast:null,
  gasError:null,
};

// ── DB API ───────────────────────────────────────────────
// L'API OPTIPLAN interprète les paramètres via les query params
// Pour les payloads lourds (importEDI), on encode en JSON dans ?data=
// L'API doit recevoir : action=importEDI&data=<json_encodé>


async function gasGet(params){
  const url=new URL(GAS_URL);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,typeof v==="object"?JSON.stringify(v):v));
  try{
    const res=await fetch(url.toString(),{redirect:"follow"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const json=await res.json();
    if(json.error)throw new Error(json.error);
    return json;
  }catch(e){
    throw new Error("GAS: "+e.message);
  }
}

// ── CHARGEMENT INITIAL ────────────────────────────────────
async function loadFromGAS(){
  GS_LOADING=true;
  S.gasError=null;
  render();
  try{
    // 1. Config clients
    const cfgRes=await gasGet({action:"getConfig"});
    CLIENTS=cfgRes.data;
    CFG={};
    CLIENTS.forEach(c=>{
      CFG[c.id]={ts:c.ts,biasWarn:c.biasWarn,biasDanger:c.biasDanger,service:c.service};
    });

    // 2. Items
    const itemsRes=await gasGet({action:"getItems"});
    ITEMS=itemsRes.data.map(i=>({
      id:i.id,label:i.label,cli:i.cli,bucket:i.bucket,
      famille:i.famille,lt:i.lt,
      pn:i.id, // pas de PN client dans la BDD, on utilise l'id
    }));
    SS={};
    itemsRes.data.forEach(i=>{SS[i.id]={ss:i.ss_actuel,uom:i.uom};});

    // 3. Historique EDI
    const ediRes=await gasGet({action:"getEDIHistory"});
    EDI_DATA={};
    Object.entries(ediRes.data).forEach(([ref,recs])=>{
      EDI_DATA[ref]=recs.map(r=>({
        id:r.id,
        date:r.date,
        qtys:r.qtys
      })).sort((a,b)=>a.id.localeCompare(b.id));
    });
    // S'assurer que toutes les refs ont au moins un tableau vide
    ITEMS.forEach(it=>{if(!EDI_DATA[it.id])EDI_DATA[it.id]=[];});

    if(!S.selectedItem&&ITEMS.length)S.selectedItem=ITEMS[0].id;
    if(!S.selectedClient&&CLIENTS.length)S.selectedClient=CLIENTS[0].id;

    GS_CONNECTED=true;
    ALERTS_CACHE=null;
    showToast("Base de données synchronisée","ti-cloud-check");
  }catch(e){
    S.gasError=e.message;
    GS_CONNECTED=false;
  }finally{
    GS_LOADING=false;
    render();
  }
}

// ── IMPORT EDI ────────────────────────────────────────────
// On envoie via GET avec data= encodé en JSON
// L'API reçoit action=importEDI&data={...}
async function importToGAS(parsedFiles){
  if(!GS_CONNECTED){showToast("Connectez d'abord la base de données","ti-alert-triangle");return;}
  showLoading("Import en cours...");
  let totalImported=0;
  let errors=[];
  for(const f of parsedFiles){
    const rows=f.rows.map(row=>{
      const ref=row.REFERENCE?.trim();
      const it=ITEMS.find(i=>i.id===ref);
      if(!it)return null;
      const qtys={};
      f.periods.forEach(p=>{qtys[p]=parseInt(row._qtys[p])||0;});
      return{ref,clientId:it.cli,bucket:f.bucket||"week",qtys};
    }).filter(Boolean);

    if(!rows.length){errors.push(f.fileName+": aucune référence reconnue");continue;}

    const payload={
      fileName:f.fileName,
      meta:{reception:f.meta.reception,date:f.meta.date,emetteur:f.meta.emetteur},
      rows
    };
    try{
      const res=await gasGet({action:"importEDI",data:JSON.stringify(payload)});
      totalImported+=res.imported||0;
    }catch(e){
      errors.push(f.fileName+": "+e.message);
    }
  }
  hideLoading();
  if(errors.length)showToast("Erreurs: "+errors.slice(0,2).join(" | "),"ti-alert-triangle",5000);
  else showToast(`${totalImported} référence(s) importée(s) dans la base de données`,"ti-circle-check");
  // Recharger les données
  await loadFromGAS();
  S.importResult=true;
  S.importedFiles=[];
  go("verify");
}

// ── IMPORT MASTER SS ──────────────────────────────────────
async function importMasterToDB(masterData){
  if(!GS_CONNECTED){showToast("Connectez d'abord la base de données","ti-alert-triangle");return;}
  showLoading("Mise à jour SS...");
  const rows=Object.entries(masterData).map(([ref,v])=>({ref,ss_actuel:v.ss,uom:v.uom||"PCS"}));
  try{
    await gasGet({action:"importMaster",data:JSON.stringify(rows)});
    showToast(`${rows.length} SS mis à jour dans la base de données`,"ti-circle-check");
    await loadFromGAS();
  }catch(e){
    showToast("Erreur importMaster: "+e.message,"ti-alert-triangle");
  }finally{
    hideLoading();
  }
}

// ── LOADING OVERLAY ───────────────────────────────────────
function showLoading(msg="Chargement..."){
  let el=document.getElementById("loadingOverlay");
  if(!el){el=document.createElement("div");el.id="loadingOverlay";el.className="loading-overlay";document.body.appendChild(el);}
  el.innerHTML=`<div class="spinner"></div><div style="font-size:14px;font-weight:600">${msg}</div>`;
  el.style.display="flex";
}
function hideLoading(){
  const el=document.getElementById("loadingOverlay");
  if(el)el.style.display="none";
}

// ── MATH ─────────────────────────────────────────────────
function getZone(w){const i=parseInt(w.replace("S",""));return i<=2?"frozen":i<=5?"slushy":"liquid";}

function calcZone(last,prev,weeks){
  const errors=weeks.map(w=>(last.qtys[w]||0)-(prev.qtys[w]||0));
  const n=errors.length;
  const cum=errors.reduce((a,b)=>a+b,0);
  const mean=cum/n;
  const mad=errors.reduce((a,b)=>a+Math.abs(b),0)/n;
  const prevMean=weeks.map(w=>prev.qtys[w]||0).reduce((a,b)=>a+b,0)/n;
  const biasPct=prevMean>0?Math.round(mean/prevMean*1000)/10:0;
  const ts=mad>0?Math.round(cum/mad*100)/100:0;
  return{
    cum:Math.round(cum),mean:Math.round(mean*10)/10,biasPct,
    mad:Math.round(mad),ts,prevMean:Math.round(prevMean),
    direction:cum>0?"Sur-programmé":"Sous-programmé"
  };
}

function calcMetrics(recs,cfg){
  if(!recs||recs.length<2)return null;
  const last=recs[recs.length-1],prev=recs[recs.length-2];
  const zones={frozen:WEEKS.filter(w=>getZone(w)==="frozen"),
               slushy:WEEKS.filter(w=>getZone(w)==="slushy"),
               liquid:WEEKS.filter(w=>getZone(w)==="liquid")};
  const r={};
  Object.entries(zones).forEach(([z,wks])=>{
    const v=calcZone(last,prev,wks);
    r[z]={...v,thresh:(cfg.ts||DEFAULT_CFG.ts)[z],
      tsFlag:Math.abs(v.ts)>(cfg.ts||DEFAULT_CFG.ts)[z],
      biasFlag:Math.abs(v.biasPct)>(cfg.biasDanger||DEFAULT_CFG.biasDanger),
      flag:Math.abs(v.ts)>(cfg.ts||DEFAULT_CFG.ts)[z]||Math.abs(v.biasPct)>(cfg.biasDanger||DEFAULT_CFG.biasDanger)};
  });
  return r;
}

function calcSS(mad,sl){return Math.round((Z_TABLE[sl]||1.65)*mad);}
function avgMadFromMetrics(m){if(!m)return 0;return Math.round((m.frozen.mad+m.slushy.mad+m.liquid.mad)/3);}

function detectGaps(rec){
  if(!rec)return[];
  return WEEKS.filter(w=>!rec.qtys[w]||rec.qtys[w]===0);
}

function classifyDemand(recs){
  if(!recs||!recs.length)return{type:"N/A",color:C.muted};
  const q=WEEKS.map(w=>recs[recs.length-1].qtys[w]||0);
  const mean=q.reduce((a,b)=>a+b,0)/q.length;
  if(mean===0)return{type:"N/A",color:C.muted};
  const cv=Math.sqrt(q.reduce((a,b)=>a+(b-mean)**2,0)/q.length)/mean;
  const trend=q[q.length-1]-q[0];
  if(cv<0.2&&Math.abs(trend)<mean*0.1)return{type:"Stable",color:C.ok};
  if(Math.abs(trend)>mean*0.3)return{type:trend>0?"Tendance ↑":"Tendance ↓",color:C.accent};
  if(Math.max(...q)/(Math.min(...q)||1)>1.5)return{type:"Saisonnière",color:C.warn};
  return{type:"Aléatoire",color:C.danger};
}

function clientScore(clientId){
  const items=ITEMS.filter(i=>i.cli===clientId);
  if(!items.length)return 100;
  let total=0,flags=0;
  items.forEach(it=>{
    const m=calcMetrics(EDI_DATA[it.id],CFG[it.cli]||DEFAULT_CFG);
    if(!m)return;
    Object.values(m).forEach(v=>{total++;if(v.flag)flags++;});
  });
  return total>0?Math.round((1-flags/total)*100):100;
}

// ── COMPUTED ALERTS ───────────────────────────────────────
function getAllAlerts(){
  if(ALERTS_CACHE)return ALERTS_CACHE;
  const alerts=[];
  ITEMS.forEach(it=>{
    const cfg=CFG[it.cli]||DEFAULT_CFG;
    const m=calcMetrics(EDI_DATA[it.id],cfg);
    if(!m)return;
    const recs=EDI_DATA[it.id];
    const lastRec=recs[recs.length-1];
    const gaps=lastRec?detectGaps(lastRec):[];
    Object.entries(m).forEach(([z,v])=>{
      if(v.flag)alerts.push({item:it,zone:z,...v,type:"drift"});
    });
    if(gaps.length>0)alerts.push({item:it,zone:"gap",gaps,type:"gap",flag:true});
  });
  // Priorité : frozen > slushy > gap > liquid
  const order={frozen:0,slushy:1,gap:2,liquid:3};
  alerts.sort((a,b)=>(order[a.zone]||3)-(order[b.zone]||3));
  ALERTS_CACHE=alerts;
  return alerts;
}

function getLastImportDate(){
  let latest=null;
  ITEMS.forEach(it=>{
    const recs=EDI_DATA[it.id];
    if(recs&&recs.length){
      // Parse DD/MM/YYYY correctement
      const raw=recs[recs.length-1].date;
      const parts=raw.split(/[\/\-]/);
      let d;
      if(parts.length===3){
        // Essayer DD/MM/YYYY
        d=new Date(+parts[2],+parts[1]-1,+parts[0]);
        if(isNaN(d))d=new Date(raw);
      } else d=new Date(raw);
      if(!latest||d>latest)latest=d;
    }
  });
  if(!latest)return null;
  return latest.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
}

function renderVerify(){
  if(!GS_CONNECTED)return renderNotConnected();
  const allAlerts=getAllAlerts();
  const totalRefs=ITEMS.length;
  // Un Set des refs avec dérive (évite le double-comptage)
  const driftRefs=new Set(allAlerts.filter(a=>a.type==="drift").map(a=>a.item.id));
  const gapRefs=new Set(allAlerts.filter(a=>a.type==="gap").map(a=>a.item.id));
  const anomalyRefs=new Set([...driftRefs,...gapRefs]);
  const okRefs=totalRefs-anomalyRefs.size;

  return`
  <div class="card mb-16" style="border-left:4px solid ${allAlerts.length>0?C.warn:C.ok}">
    <div class="flex-between mb-16">
      <div>
        <div class="card-title">Rapport de réception — ${new Date().toLocaleDateString("fr-FR")}</div>
        <div class="card-sub">Vérification automatique · Données depuis la base de données</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="go('alerts')">Voir les alertes →</button>
    </div>
    <div class="grid-4">
      ${[
        {icon:"ti-packages",label:"Références reçues",val:totalRefs,color:C.blue,bg:"#DBEAFE"},
        {icon:"ti-circle-check",label:"Sans anomalie",val:Math.max(0,okRefs),color:C.ok,bg:"#D1FAE5"},
        {icon:"ti-alert-triangle",label:"Dérives détectées",val:driftRefs.size,color:C.danger,bg:"#FEE2E2"},
        {icon:"ti-layout-grid-remove",label:"Vides programme",val:gapRefs.size,color:C.warn,bg:"#FEF3C7"},
      ].map(k=>`<div style="background:${k.bg};border-radius:10px;padding:14px;text-align:center">
        <i class="ti ${k.icon}" style="font-size:24px;color:${k.color};display:block;margin-bottom:6px"></i>
        <div style="font-size:24px;font-weight:800;color:${k.color}">${k.val}</div>
        <div style="font-size:11px;font-weight:600;color:${k.color};margin-top:2px">${k.label}</div>
      </div>`).join("")}
    </div>
  </div>

  <div class="card">
    <div class="card-title mb-16">Détail par référence — Programme reçu vs t-1</div>
    ${!ITEMS.length?`<div style="text-align:center;padding:24px;color:#94A3B8">Aucune référence dans la base de données. Initialisez la structure via l'administration.</div>`:`
    <table class="tbl">
      <thead><tr>
        <th>Référence</th><th>Désignation</th><th>Client T1</th>
        <th>Zone Figée</th><th>Zone Semi-figée</th><th>Zone Flexible</th>
        <th>Vides</th><th>Statut</th><th></th>
      </tr></thead>
      <tbody>
        ${ITEMS.map(it=>{
          const cfg=CFG[it.cli]||DEFAULT_CFG;
          const recs=EDI_DATA[it.id]||[];
          const m=calcMetrics(recs,cfg);
          const lastRec=recs[recs.length-1];
          const gaps=lastRec?detectGaps(lastRec):[];
          const cl=CLIENTS.find(c=>c.id===it.cli)||{label:it.cli,color:C.blue};
          const hasFlag=m&&Object.values(m).some(v=>v.flag);
          const hasGap=gaps.length>0;
          const noData=recs.length<2;

          function zoneCell(z){
            if(noData)return`<td style="color:#94A3B8;font-size:11px">< 2 réceptions</td>`;
            if(!m)return`<td>—</td>`;
            const v=m[z];
            return`<td>
              <div style="font-weight:700;color:${v.flag?C.danger:C.ok};font-size:12px">${v.flag?"🚨":"✓"} TS: ${v.ts}</div>
              <div style="font-size:10px;color:#64748B">Biais: ${v.biasPct>0?"+":""}${v.biasPct}%</div>

          }

          return`<tr class="${(hasFlag||hasGap)&&!noData?"alert-row":""}">
            <td class="fw-700" style="color:${C.blue};font-family:monospace;font-size:12px">${it.id}</td>
            <td style="font-size:12px">${it.label}</td>
            <td><span style="color:${cl.color||C.blue};font-weight:600;font-size:11px">${cl.label}</span></td>
            ${zoneCell("frozen")}${zoneCell("slushy")}${zoneCell("liquid")}
            <td>${hasGap?`<span class="badge badge-warn"><i class="ti ti-alert-triangle"></i> ${gaps.join(",")}</span>`:`<span style="color:${C.ok};font-size:12px">✓</span>`}</td>
            <td>${noData?`<span class="badge badge-neutral">Pas d'histor.</span>`:hasFlag||hasGap?`<span class="badge badge-danger">Anomalie</span>`:`<span class="badge badge-ok">OK</span>`}</td>
            <td><button class="btn btn-ghost btn-sm" onclick="go('analyse',{selectedItem:'${it.id}'})"><i class="ti ti-zoom-in"></i></button></td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>`}
  </div>`;
}

// ── STEP 3: ALERTS ────────────────────────────────────────
function renderAlerts(){
  if(!GS_CONNECTED)return renderNotConnected();
  const allAlerts=getAllAlerts();
  const filtered=S.alertFilter==="all"?allAlerts:allAlerts.filter(a=>a.zone===S.alertFilter);

  return`
  <div class="flex-between mb-16">
    <div>
      <div style="font-size:18px;font-weight:800">${allAlerts.length} alerte${allAlerts.length!==1?"s":""} détectée${allAlerts.length!==1?"s":""}</div>
      <div class="text-sm text-muted">Classées par priorité · Zone Figée en premier</div>
    </div>
    <div class="flex gap-8" style="flex-wrap:wrap">
      ${["all","frozen","slushy","liquid","gap"].map(f=>{
        const labels={all:"Toutes",frozen:"Zone Figée",slushy:"Semi-figée",liquid:"Flexible",gap:"Vides"};
        const counts={all:allAlerts.length,
          frozen:allAlerts.filter(a=>a.zone==="frozen").length,
          slushy:allAlerts.filter(a=>a.zone==="slushy").length,
          liquid:allAlerts.filter(a=>a.zone==="liquid").length,
          gap:allAlerts.filter(a=>a.zone==="gap").length};
        return`<button onclick="update({alertFilter:'${f}'})" style="
          background:${S.alertFilter===f?"#0B1F3A":"#fff"};
          color:${S.alertFilter===f?"#fff":"#64748B"};
          border:1px solid ${S.alertFilter===f?"#0B1F3A":"#E2E8F0"};
          border-radius:99px;padding:5px 14px;font-size:12px;font-weight:600">
          ${labels[f]} ${counts[f]>0?`(${counts[f]})`:""}
        </button>`;
      }).join("")}
    </div>
  </div>

  ${filtered.length===0?`<div class="card" style="text-align:center;padding:40px">
    <i class="ti ti-circle-check" style="font-size:48px;color:${C.ok};display:block;margin-bottom:12px"></i>
    <div style="font-size:16px;font-weight:700;color:${C.ok}">Aucune alerte dans cette zone</div>
    ${allAlerts.length===0?`<div class="text-sm text-muted mt-4">Importez au moins 2 réceptions EDI pour calculer les métriques</div>`:""}
  </div>`:""}

  ${filtered.map((a,i)=>{
    const cl=CLIENTS.find(c=>c.id===a.item.cli)||{label:a.item.cli,color:C.blue};
    const zoneClass=a.zone==="frozen"?"frozen":a.zone==="slushy"?"slushy":a.zone==="gap"?"gap":"liquid";
    const zoneLabel=a.zone==="frozen"?"Zone Figée (S1-S2)":a.zone==="slushy"?"Zone Semi-figée (S3-S5)":a.zone==="liquid"?"Zone Flexible (S6-S12)":"Vides programme";
    const priority=a.zone==="frozen"?"PRIORITÉ HAUTE":a.zone==="slushy"?"PRIORITÉ MOYENNE":a.zone==="gap"?"À COMPLÉTER":"SURVEILLER";
    const priorityColor=a.zone==="frozen"?C.danger:a.zone==="slushy"?C.warn:a.zone==="gap"?"#8B5CF6":C.teal;

    return`<div class="alert-card ${zoneClass}">
      <div class="flex-between mb-8">
        <div class="flex gap-8">
          <span style="background:${priorityColor};color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px">${priority}</span>
          <span class="zone-chip zone-${a.zone==="gap"?"frozen":a.zone}">${zoneLabel}</span>
          <span style="color:${cl.color||C.blue};font-weight:700;font-size:12px">${cl.label}</span>
        </div>
        <div class="flex gap-8">
          <button class="btn btn-ghost btn-sm" onclick="go('analyse',{selectedItem:'${a.item.id}'})">
            <i class="ti ti-zoom-in"></i> Analyser
          </button>
          <button class="btn btn-ghost btn-sm" onclick="showShareAlert(${i})">
            <i class="ti ti-share"></i> Notifier
          </button>
        </div>
      </div>
      <div class="flex gap-8 mb-8">
        <div style="font-family:monospace;font-size:12px;color:${C.blue};font-weight:700">${a.item.id}</div>
        <div style="font-size:13px;font-weight:600">${a.item.label}</div>
      </div>
      ${a.type==="gap"?`
        <div style="font-size:13px;color:#64748B">
          <i class="ti ti-layout-grid-remove" style="color:#8B5CF6;margin-right:4px"></i>
          Semaines sans programme : <strong style="color:#8B5CF6">${a.gaps.join(", ")}</strong>
          — Vérifier avec le client T1 avant planification MPS
        </div>
      `:`
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:10px">
          ${[
            {l:"Biais cumulé",v:(a.cum>0?"+":"")+a.cum+" u.",flag:a.biasFlag},
            {l:"Biais %",v:(a.biasPct>0?"+":"")+a.biasPct+"%",flag:a.biasFlag},
            {l:"Tracking Signal",v:a.ts+" / ±"+a.thresh,flag:a.tsFlag},
          ].map(k=>`<div style="background:#fff;border-radius:6px;padding:8px 10px;border:1px solid ${k.flag?"#FCA5A5":"#E2E8F0"}">
            <div style="font-size:10px;color:#64748B;margin-bottom:2px">${k.l}</div>
            <div style="font-size:14px;font-weight:700;color:${k.flag?C.danger:"#1E293B"}">${k.v}</div>
          </div>`).join("")}
        </div>
        <div style="font-size:12px;color:#64748B;background:#fff;border-radius:6px;padding:8px 12px;border:1px solid #E2E8F0">
          <strong>Impact :</strong>
          ${a.zone==="frozen"
            ?`Confirmation commande S0 en ${a.direction.toLowerCase()} → risque ${a.cum>0?"transport exceptionnel / surstock":"rupture production"}`
            :a.zone==="slushy"
              ?`Dérive ${a.direction.toLowerCase()} en Semi-figé → impact PDP et calcul MRP semaines S3-S5`
              :`Tendance ${a.direction.toLowerCase()} en Flexible → réviser stock de sécurité et approvisionnements`}
        </div>
      `}
    </div>`;
  }).join("")}

  ${allAlerts.length>0?`<div class="flex mt-16 gap-8">
    <button class="btn btn-primary" onclick="go('share')"><i class="ti ti-mail-forward"></i> Envoyer le rapport</button>
    <button class="btn btn-ghost" onclick="go('verify')">← Retour vérification</button>
  </div>`:""}`;
}

// ── STEP 4: ANALYSE ───────────────────────────────────────
function renderAnalyse(){
  if(!GS_CONNECTED)return renderNotConnected();
  if(!ITEMS.length)return`<div class="card" style="text-align:center;padding:40px;color:#94A3B8">Aucune référence chargée depuis la base de données.</div>`;

  const it=ITEMS.find(i=>i.id===S.selectedItem)||ITEMS[0];
  const cfg=CFG[it.cli]||DEFAULT_CFG;
  const recs=EDI_DATA[it.id]||[];
  const m=calcMetrics(recs,cfg);
  const p=classifyDemand(recs);
  const cl=CLIENTS.find(c=>c.id===it.cli)||{label:it.cli,color:C.blue};
  const avgMad=avgMadFromMetrics(m);
  const ss=calcSS(avgMad,cfg.service);
  const ssAct=SS[it.id]?.ss||0;
  const gap=ss-ssAct;
  const last=recs.length?recs[recs.length-1]:null;
  const prev=recs.length>1?recs[recs.length-2]:null;
  const LCOLORS=["#CBD5E1","#94A3B8","#60A5FA","#00A8E8","#00C9B1","#1A4A8A"];

  // SVG
  const svgW=600,svgH=180,pL=40,pR=10,pT=14,pB=24;
  const pw=svgW-pL-pR,ph=svgH-pT-pB;
  const maxQ=recs.length?Math.max(...recs.flatMap(r=>WEEKS.map(w=>r.qtys[w]||0)),1):1;
  function px(i){return pL+i/(WEEKS.length-1)*pw;}
  function py(v){return pT+ph-(v/maxQ)*ph;}
  const gridLines=[0,.25,.5,.75,1].map(p=>{
    const y=pT+ph*(1-p);
    return`<line x1="${pL}" x2="${svgW-pR}" y1="${y}" y2="${y}" stroke="#F1F5F9" stroke-width="1"/>
    <text x="${pL-4}" y="${y+3}" text-anchor="end" font-size="8" fill="#94A3B8">${Math.round(maxQ*p)}</text>`;
  }).join("");
  const xFrz=px(2),xSlu=px(5);
  const lines_svg=recs.map((r,ri)=>{
    const pts=WEEKS.map((w,wi)=>`${px(wi)},${py(r.qtys[w]||0)}`).join(" ");
    const isLast=ri===recs.length-1;
    return`<polyline points="${pts}" fill="none" stroke="${LCOLORS[ri%LCOLORS.length]}" stroke-width="${isLast?2.5:1.2}" stroke-opacity="${isLast?1:0.5}" stroke-linejoin="round"/>`;
  }).join("");
  const wLabels=WEEKS.map((w,i)=>`<text x="${px(i)}" y="${svgH-4}" text-anchor="middle" font-size="8" fill="#94A3B8">${w}</text>`).join("");

  return`
  <div class="card mb-16">
    <div class="flex-between mb-8">
      <div class="card-title">Sélectionner une référence</div>
      <div class="search-box" style="width:300px">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Rechercher..." id="analyseSearch" oninput="update({searchQuery:this.value})" value="${S.searchQuery}">
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${ITEMS.filter(i=>!S.searchQuery||i.id.toLowerCase().includes(S.searchQuery.toLowerCase())||i.label.toLowerCase().includes(S.searchQuery.toLowerCase())).map(i=>{
        const hasF=calcMetrics(EDI_DATA[i.id],CFG[i.cli]||DEFAULT_CFG)&&Object.values(calcMetrics(EDI_DATA[i.id],CFG[i.cli]||DEFAULT_CFG)).some(v=>v.flag);
        return`<button onclick="update({selectedItem:'${i.id}'})" style="
          background:${S.selectedItem===i.id?"#0B1F3A":"#F8FAFC"};
          color:${S.selectedItem===i.id?"#fff":"#1E293B"};
          border:1px solid ${S.selectedItem===i.id?"#0B1F3A":hasF?"#FCA5A5":"#E2E8F0"};
          border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600">
          <span style="font-family:monospace">${i.id}</span>${hasF?`<span style="color:${S.selectedItem===i.id?"#FCA5A5":C.danger}"> !</span>`:""}
        </button>`;
      }).join("")}
    </div>
  </div>

  <div class="card mb-16" style="background:#0B1F3A;color:#fff;border:none">
    <div class="flex-between">
      <div>
        <div style="font-size:11px;color:${cl.color||C.accent};font-weight:700;margin-bottom:4px">${cl.label}</div>
        <div style="font-size:18px;font-weight:800">${it.label}</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:4px">
          Réf. <span style="font-family:monospace;color:#00A8E8">${it.id}</span> · 
          ${it.famille||"—"} · ${it.bucket==="week"?"Programme semaine":"Programme journalier"}
        </div>
      </div>
      <div class="flex gap-8">
        <span style="background:${p.color};color:#fff;padding:5px 14px;border-radius:99px;font-size:12px;font-weight:700">${p.type}</span>
        <div style="background:#1e3a5f;border-radius:10px;padding:10px 16px;text-align:center">
          <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase">SS Calculé</div>
          <div style="font-size:22px;font-weight:800;color:${C.teal}">${ss}</div>
          <div style="font-size:10px;color:#94a3b8">SL ${cfg.service}% · MAD=${avgMad}</div>
        </div>
        <div style="background:#1e3a5f;border-radius:10px;padding:10px 16px;text-align:center">
          <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase">SS Actuel</div>
          <div style="font-size:22px;font-weight:800;color:#fff">${ssAct}</div>
          <div style="font-size:10px;color:${gap>0?C.danger:C.ok};font-weight:700">${gap>0?"Déficit":"Excédent"} ${Math.abs(gap)}</div>
        </div>
      </div>
    </div>
  </div>

  ${recs.length<2?`<div class="card" style="text-align:center;padding:32px;color:#64748B">
    <i class="ti ti-history" style="font-size:36px;display:block;margin-bottom:12px;color:#CBD5E1"></i>
    <div style="font-weight:700;margin-bottom:4px">Minimum 2 réceptions requises</div>
    <div class="text-sm">Importez au moins 2 fichiers EDI pour calculer les métriques de cette référence.</div>
  </div>`:`

  <div class="grid-2 mb-16">
    <div class="card">
      <div class="card-title">Évolution des programmes reçus</div>
      <div class="card-sub">${recs.length} réceptions · trait épais = dernière</div>
      <svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:auto">
        <rect x="${pL}" y="${pT}" width="${xFrz-pL}" height="${ph}" fill="#EFF6FF" opacity=".5"/>
        <rect x="${xFrz}" y="${pT}" width="${xSlu-xFrz}" height="${ph}" fill="#FFFBEB" opacity=".5"/>
        <rect x="${xSlu}" y="${pT}" width="${svgW-pR-xSlu}" height="${ph}" fill="#F0FDFA" opacity=".5"/>
        <text x="${pL+2}" y="${pT+10}" font-size="8" fill="#1D4ED8" opacity=".7">Figé</text>
        <text x="${xFrz+2}" y="${pT+10}" font-size="8" fill="#B45309" opacity=".7">Semi-figé</text>
        <text x="${xSlu+2}" y="${pT+10}" font-size="8" fill="#0F766E" opacity=".7">Flexible</text>
        ${gridLines}${lines_svg}${wLabels}
      </svg>
      <div class="flex mt-8" style="flex-wrap:wrap;gap:6px">
        ${recs.map((r,i)=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#64748B">
          <span style="width:16px;height:${i===recs.length-1?3:1.5}px;background:${LCOLORS[i%LCOLORS.length]};display:inline-block;border-radius:2px"></span>
          ${r.id} · ${r.date}
        </span>`).join("")}
      </div>
    </div>

    <div class="card">
      <div class="card-title">MAD par zone — Variabilité</div>
      <div class="card-sub">MAD = Σ|Δ programme| / n · Base calcul SS</div>
      ${["frozen","slushy","liquid"].map(z=>{
        const wks=WEEKS.filter(w=>getZone(w)===z);
        const errs=last&&prev?wks.map(w=>Math.abs((last.qtys[w]||0)-(prev.qtys[w]||0))):[];
        const mad=errs.length?Math.round(errs.reduce((a,b)=>a+b,0)/errs.length):0;
        const meanD=last?Math.round(wks.map(w=>last.qtys[w]||0).reduce((a,b)=>a+b,0)/wks.length):0;
        const cv=meanD>0?Math.round(mad/meanD*1000)/10:0;
        const cvColor=cv>30?C.danger:cv>15?C.warn:C.ok;
        const zLabel=z==="frozen"?"Zone Figée":z==="slushy"?"Zone Semi-figée":"Zone Flexible";
        const zColor=z==="frozen"?C.accent:z==="slushy"?C.warn:C.teal;
        return`<div style="border-left:3px solid ${zColor};padding:10px 12px;background:#F8FAFC;border-radius:0 8px 8px 0;margin-bottom:8px">
          <div style="font-size:11px;font-weight:700;color:${zColor};margin-bottom:6px">${zLabel}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
            ${[{v:mad,l:"MAD"},{v:meanD,l:"Demande moy."},{v:cv+"%",l:"CV",c:cvColor}].map(k=>`<div style="text-align:center${k===undefined||k.c===undefined?"":";"}">
              <div style="font-size:20px;font-weight:800;color:${k.c||"#1E293B"}">${k.v}</div>
              <div style="font-size:10px;color:#64748B">${k.l}</div>
            </div>`).join("")}
          </div>
          <div class="pbar mt-8"><div class="pbar-fill" style="width:${Math.min(cv,100)}%;background:${cvColor}"></div></div>
        </div>`;
      }).join("")}
    </div>
  </div>

  <div class="card mb-16">
    <div class="card-title mb-16">Biais & Tracking Signal — Dernière réception vs t-1</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
      ${m?Object.entries(m).map(([z,v])=>{
        const pct=Math.min(Math.abs(v.ts)/v.thresh,1);
        const col=pct<0.6?C.ok:pct<1?C.warn:C.danger;
        const zL=z==="frozen"?"Zone Figée":z==="slushy"?"Zone Semi-figée":"Zone Flexible";
        return`<div style="border:1.5px solid ${v.flag?C.danger:"#E2E8F0"};border-radius:10px;padding:14px;background:${v.flag?"#FFF5F5":"#fff"}">
          <div class="flex-between mb-10">
            <span class="zone-chip zone-${z}">${zL}</span>
            ${v.flag?`<span class="badge badge-danger">Alerte</span>`:`<span class="badge badge-ok">OK</span>`}
          </div>
          <div style="background:#F8FAFC;border-radius:8px;padding:10px;margin-bottom:10px">
            <div style="font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;margin-bottom:8px">Biais</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px">
              ${[
                {l:"Cumulé",v:(v.cum>0?"+":"")+v.cum},
                {l:"Moy.",v:(v.mean>0?"+":"")+v.mean},
                {l:"% prog.",v:(v.biasPct>0?"+":"")+v.biasPct+"%",hl:true},
              ].map(k=>`<div style="text-align:center">
                <div style="font-size:9px;color:#64748B">${k.l}</div>
                <div style="font-size:15px;font-weight:700;color:${k.hl?(v.biasFlag?C.danger:C.ok):v.cum>0?C.danger:C.ok}">${k.v}</div>
              </div>`).join("")}
            </div>
            <div style="display:flex;gap:6px;justify-content:center">
              <span class="badge ${v.biasFlag?"badge-danger":"badge-ok"}">${Math.abs(v.biasPct)<(cfg.biasWarn||10)?"Faible":Math.abs(v.biasPct)<(cfg.biasDanger||25)?"Modéré":"Fort"}</span>
              <span class="badge badge-neutral">${v.direction}</span>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-bottom:10px">
            <div style="flex:1;text-align:center">
              <div style="font-size:10px;color:#64748B;margin-bottom:2px">MAD</div>
              <div style="font-size:20px;font-weight:800">${v.mad}</div>
            </div>
            <div style="flex:1;text-align:center;border-left:1px solid #E2E8F0">
              <div style="font-size:10px;color:#64748B;margin-bottom:2px">Tracking Signal</div>
              <div style="font-size:20px;font-weight:800;color:${v.tsFlag?C.danger:"#1E293B"}">${v.ts}</div>
            </div>
          </div>
          <div style="font-size:9px;color:#64748B;margin-bottom:3px;display:flex;justify-content:space-between">
            <span>TS</span><span style="color:${col};font-weight:700">${v.ts} / seuil ±${v.thresh}</span>
          </div>
          <div class="pbar"><div class="pbar-fill" style="width:${pct*100}%;background:${col}"></div></div>
        </div>`;
      }).join(""):""}
    </div>
  </div>

  <div class="card">
    <div class="card-title mb-16">Historique des réceptions EDI</div>
    <div class="timeline">
      ${[...recs].reverse().map((r,i)=>{
        const isLatest=i===0;
        const prevR=i<recs.length-1?[...recs].reverse()[i+1]:null;
        let biasPct="—",tsF="—",statusBadge=`<span class="badge badge-neutral">Référence</span>`;
        if(prevR){
          const b=calcZone(r,prevR,WEEKS);
          biasPct=(b.biasPct>0?"+":"")+b.biasPct+"%";
          tsF=b.ts;
          const flag=Math.abs(b.ts)>(cfg.ts||DEFAULT_CFG.ts).frozen||Math.abs(b.biasPct)>(cfg.biasDanger||DEFAULT_CFG.biasDanger);
          statusBadge=flag?`<span class="badge badge-danger"><i class="ti ti-alert-triangle"></i> Dérive</span>`:`<span class="badge badge-ok">OK</span>`;
        }
        return`<div class="timeline-item ${isLatest?"latest":""}">
          <div class="flex-between">
            <div class="flex gap-8">
              <span style="font-weight:700;color:${isLatest?C.accent:"#64748B"};font-family:monospace">${r.id}</span>
              <span style="font-size:12px;color:#64748B">${r.date}</span>
              ${isLatest?`<span class="badge badge-info">Dernière</span>`:""}
            </div>
            ${statusBadge}
          </div>
          ${!isLatest?`<div style="font-size:11px;color:#64748B;margin-top:4px">Biais : <strong>${biasPct}</strong> · TS Figé : <strong>${tsF}</strong></div>`:""}
        </div>`;
      }).join("")}
    </div>
  </div>`}`;
}

// ── STEP 5: CLIENT T1 ─────────────────────────────────────
function renderClient(){
  if(!GS_CONNECTED)return renderNotConnected();
  if(!CLIENTS.length)return`<div class="card" style="text-align:center;padding:40px;color:#94A3B8">Aucun client chargé.</div>`;

  const cl=CLIENTS.find(c=>c.id===S.selectedClient)||CLIENTS[0];
  const cfg=CFG[S.selectedClient||cl.id]||DEFAULT_CFG;
  const clientItems=ITEMS.filter(i=>i.cli===cl.id);
  const score=clientScore(cl.id);
  const scoreColor=score>=85?C.ok:score>=65?C.warn:C.danger;
  const allMetrics=clientItems.map(it=>({it,m:calcMetrics(EDI_DATA[it.id],cfg)}));
  const totalAlerts=allMetrics.filter(({m})=>m&&Object.values(m).some(v=>v.flag)).length;
  const avgBias=allMetrics.length?Math.round(allMetrics.reduce((a,{m})=>a+(m?Math.abs(m.frozen.biasPct):0),0)/allMetrics.length*10)/10:0;
  const stableCount=allMetrics.filter(({it})=>classifyDemand(EDI_DATA[it.id]).type==="Stable").length;

  return`

// ── CSV PARSERS ───────────────────────────────────────────
function parseEDI(text,fileName){
  const lines=text.split(/\r?\n/).filter(l=>l.trim()&&l.replace(/;/g,"").trim());
  const meta={};let hi=-1,cols=[],periods=[],bucket="week",rows=[];
  lines.forEach((line,i)=>{
    const cells=line.split(";").map(c=>c.trim().replace(/^\uFEFF/,"").replace(/"/g,""));
    const k=cells[0].toUpperCase();
    if(k==="EMETTEUR")meta.emetteur=cells[1];
    else if(k==="DATE_EMISSION")meta.date=cells[1];
    else if(k==="RECEPTION_NUM")meta.reception=cells[1];
    else if(k==="REFERENCE"){
      hi=i;cols=cells;
      periods=cols.filter(c=>c.match(/^S\d+$|^\d{2}\/\d{2}$/));
      bucket=periods[0]?.match(/^\d{2}\/\d{2}$/)?"day":"week";
    }
    else if(hi>-1&&cells[0].match(/^[A-Z0-9]/)){
      const row={};cols.forEach((c,j)=>{row[c]=cells[j]||"";});
      // Normaliser la référence
      row.REFERENCE=(row.REFERENCE||"").trim();
      row._qtys={};
      periods.forEach(p=>{row._qtys[p]=parseInt(row[p])||0;});
      row._periods=periods;row._bucket=bucket;
      if(row.REFERENCE)rows.push(row);
    }
  });
  return{meta,rows,periods,bucket,fileName,valid:rows.length>0};
}

function parseMaster(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const r={};
  lines.forEach((l,i)=>{
    if(i===0&&l.toUpperCase().includes("REFERENCE"))return; // skip header
    const c=l.split(";").map(x=>x.trim());
    if(c[0]&&c[1])r[c[0]]={ss:parseInt(c[1])||0,uom:c[2]||"PCS"};
  });
  return r;
}

    showToast(`${count} SS actuel parsés`,"ti-package");
    // Si connecté, proposer l'import immédiat
    if(GS_CONNECTED)importMasterToDB(data);
  };
  r.readAsText(file,"utf-8");
}

async function doImport(){
  if(!S.importedFiles.length){showToast("Aucun fichier à importer","ti-alert-triangle");return;}
  if(!GS_CONNECTED){showToast("Connectez d'abord la base de données","ti-alert-triangle");return;}
  await importToGAS(S.importedFiles);
  const btn=document.getElementById("importActionBtn");
  if(btn)btn.style.display="none";
  const suc=document.getElementById("importSuccessMsg");
  if(suc)suc.style.display="block";
}

// ── EXPORT CSV ────────────────────────────────────────────
function exportCSV(){
  const alerts=getAllAlerts();
  const rows=[["Référence","Désignation","Client T1","Zone","Biais%","TS","Statut","Direction"]];
  ITEMS.forEach(it=>{
    const m=calcMetrics(EDI_DATA[it.id],CFG[it.cli]||DEFAULT_CFG);
    if(!m)return;
    const cl=CLIENTS.find(c=>c.id===it.cli)||{label:it.cli};
    ["frozen","slushy","liquid"].forEach(z=>{
      rows.push([it.id,it.label,cl.label,z,m[z].biasPct+"%",m[z].ts,m[z].flag?"ALERTE":"OK",m[z].direction]);
    });
  });
  const csv=rows.map(r=>r.join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`OPTIPLAN_Rapport_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
  showToast("Fichier CSV exporté","ti-file-spreadsheet");
}

  const flagLines=alerts.length>0

    :"✓ Aucune alerte — programmes stables";
  const subj=`[OPTIPLAN] Analyse EDI ${new Date().toLocaleDateString("fr-FR")} — ${alerts.length} alerte(s)`;
  const body=`Bonjour,\n\nVeuillez trouver la synthèse de l'analyse EDI OPTIPLAN.\n\nDate : ${new Date().toLocaleDateString("fr-FR")}\nRéférences analysées : ${ITEMS.length}\nAlertes actives : ${alerts.length}\n\n--- ALERTES ---\n${flagLines}\n\nCordialement,\nEGBS — Supply Chain / ADV`;
  const modal=document.createElement("div");
  modal.id="emailModal";
  modal.className="modal-overlay";
  modal.innerHTML=`<div class="modal">
    <div class="flex-between mb-16">
      <div><div class="modal-title">Partager l'analyse par email</div><div class="modal-sub">Via votre client email (mailto)</div></div>
      <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#64748B">×</button>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;font-weight:700;color:#64748B;display:block;margin-bottom:4px">Destinataire(s)</label>
      <input id="emailTo" type="text" placeholder="mps@egbs.ma; appro@egbs.ma"
        style="width:100%;padding:8px 12px;border:1px solid #E2E8F0;border-radius:8px;font-size:12px;outline:none">
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;font-weight:700;color:#64748B;display:block;margin-bottom:4px">Objet</label>
      <input id="emailSubj" type="text" value="${subj.replace(/"/g,"'")}"
        style="width:100%;padding:8px 12px;border:1px solid #E2E8F0;border-radius:8px;font-size:12px;outline:none">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:11px;font-weight:700;color:#64748B;display:block;margin-bottom:4px">Message</label>
      <textarea id="emailBody" rows="8" style="width:100%;padding:8px 12px;border:1px solid #E2E8F0;border-radius:8px;font-size:11px;font-family:monospace;outline:none;resize:vertical">${body}</textarea>
    </div>
    <div class="flex-between">
      <button onclick="this.closest('.modal-overlay').remove()" class="btn btn-ghost">Annuler</button>
      <button onclick="sendEmail()" class="btn btn-primary"><i class="ti ti-send"></i> Envoyer via mailto</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function sendEmail(){
  const to=document.getElementById("emailTo").value;
  const subj=document.getElementById("emailSubj").value;
  const body=document.getElementById("emailBody").value;
  if(!to){alert("Veuillez renseigner un destinataire");return;}
  window.location.href=`mailto:${to}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  document.getElementById("emailModal")?.remove();
}

function showShareAlert(idx){
  const alerts=getAllAlerts();
  const a=alerts[idx];
  if(!a)return;
  const body=`Alerte OPTIPLAN\nRéférence : ${a.item.id} — ${a.item.label}\nZone : ${a.zone}\nTracking Signal : ${a.ts||"—"} (seuil ±${a.thresh||"—"})\nBiais : ${a.biasPct||"—"}%\nDirection : ${a.direction||"—"}\nAction requise : révision programme MPS`;
  window.location.href=`mailto:?subject=[OPTIPLAN] Alerte ${a.item.id}&body=${encodeURIComponent(body)}`;
}

// ── EVENTS ────────────────────────────────────────────────
function attachEvents(){
  const dz=document.getElementById("dropEDI");
  const fi=document.getElementById("fileEDI");
  if(dz){
    dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});
    dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));
    dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag");handleEDIFiles(e.dataTransfer.files);});
  }
  if(fi)fi.addEventListener("change",e=>handleEDIFiles(e.target.files));
  const dm=document.getElementById("dropMaster");
  const fm=document.getElementById("fileMaster");
  if(dm){
    dm.addEventListener("dragover",e=>{e.preventDefault();dm.classList.add("drag");});
    dm.addEventListener("dragleave",()=>dm.classList.remove("drag"));
    dm.addEventListener("drop",e=>{e.preventDefault();dm.classList.remove("drag");handleMasterFile(e.dataTransfer.files[0]);});
  }
  if(fm)fm.addEventListener("change",e=>handleMasterFile(e.target.files[0]));
}

// ── PDF EXPORT (jsPDF) ───────────────────────────────────
async function printReport(){
  showToast("Génération du PDF en cours...","ti-file-type-pdf",8000);

  // Charger jsPDF dynamiquement si pas encore chargé
  if(!window.jspdf){
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    });
  }

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
  const W=297,H=210; // A4 paysage
  const M=14;        // marge
  const CW=W-M*2;   // largeur utile
  let y=M;

  // ── Helpers ──────────────────────────────────────────
  const hex2rgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];};
  const setFill=h=>{const[r,g,b]=hex2rgb(h);doc.setFillColor(r,g,b);};
  const setTxt=h=>{const[r,g,b]=hex2rgb(h);doc.setTextColor(r,g,b);};
  const setDraw=h=>{const[r,g,b]=hex2rgb(h);doc.setDrawColor(r,g,b);};

  const alerts=getAllAlerts();
  const dateStr=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const dateFile=new Date().toISOString().slice(0,10);

  // ── EN-TÊTE ──────────────────────────────────────────
  // Bandeau fond marine
  setFill("#0B1F3A");
  doc.rect(0,0,W,22,"F");

  // Logo OPTIPLAN
  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  setTxt("#FFFFFF");
  doc.text("OPTI",M,13);
  setTxt("#00A8E8");
  doc.text("PLAN",M+20,13);

  // Sous-titre
  doc.setFont("helvetica","normal");
  doc.setFontSize(8);
  setTxt("#94A3B8");
  doc.text("Demand Governance · Module 1 · EGBS Supply Chain",M,18);

  // Date à droite
  doc.setFont("helvetica","bold");
  doc.setFontSize(8);
  setTxt("#FFFFFF");
  doc.text(dateStr,W-M,13,{align:"right"});

  // Scores clients à droite
  doc.setFont("helvetica","normal");
  doc.setFontSize(7);
  setTxt("#94A3B8");
  const scoresStr=CLIENTS.map(cl=>{
    const s=clientScore(cl.id);
    return`${cl.label}: ${s}/100`;
  }).join("   |   ");
  doc.text(scoresStr,W-M,18,{align:"right"});

  y=28;

  // ── KPIs ─────────────────────────────────────────────
  const driftCount=alerts.filter(a=>a.type==="drift").length;
  const gapCount=alerts.filter(a=>a.type==="gap").length;
  const kpis=[
    {l:"Références analysées", v:String(ITEMS.length),   c:"#1A4A8A", bg:"#EFF6FF"},
    {l:"Alertes actives",       v:String(alerts.length),  c:alerts.length>0?"#EF4444":"#10B981", bg:alerts.length>0?"#FEF2F2":"#F0FDF4"},
    {l:"Dérives détectées",     v:String(driftCount),     c:driftCount>0?"#EF4444":"#10B981",    bg:driftCount>0?"#FEF2F2":"#F0FDF4"},
    {l:"Programmes incomplets", v:String(gapCount),       c:gapCount>0?"#F59E0B":"#10B981",      bg:gapCount>0?"#FFFBEB":"#F0FDF4"},
  ];
  const kW=(CW-9)/4;
  kpis.forEach((k,i)=>{
    const x=M+i*(kW+3);
    setFill(k.bg);
    doc.roundedRect(x,y,kW,16,2,2,"F");
    doc.setFont("helvetica","bold");
    doc.setFontSize(16);
    setTxt(k.c);
    doc.text(k.v,x+kW/2,y+9,{align:"center"});
    doc.setFont("helvetica","bold");
    doc.setFontSize(6.5);
    setTxt("#64748B");
    doc.text(k.l.toUpperCase(),x+kW/2,y+14,{align:"center"});
  });
  y+=22;

  // ── SECTION ALERTES ───────────────────────────────────
  if(alerts.length>0){
    // Titre section
    doc.setFont("helvetica","bold");
    doc.setFontSize(9);
    setTxt("#0B1F3A");
    doc.text("ALERTES PRIORITAIRES",M,y);
    setDraw("#0B1F3A");
    doc.setLineWidth(0.5);
    doc.line(M,y+1,W-M,y+1);
    y+=6;

    const alertsToShow=alerts.filter(a=>a.type==="drift").slice(0,4);
    alertsToShow.forEach(a=>{
      const zoneColor=a.zone==="frozen"?"#EF4444":a.zone==="slushy"?"#F59E0B":"#00C9B1";
      const zoneBg=a.zone==="frozen"?"#FFF5F5":a.zone==="slushy"?"#FFFBEB":"#F0FDFA";
      const zoneLabel=a.zone==="frozen"?"Zone Figée":a.zone==="slushy"?"Zone Semi-figée":"Zone Flexible";
      const priority=a.zone==="frozen"?"PRIORITÉ HAUTE":a.zone==="slushy"?"PRIORITÉ MOYENNE":"SURVEILLER";

      setFill(zoneBg);
      doc.roundedRect(M,y,CW,9,1,1,"F");
      setFill(zoneColor);
      doc.rect(M,y,2,9,"F");

      // Badge priorité
      setFill(zoneColor);
      doc.roundedRect(M+4,y+2,24,5,1,1,"F");
      doc.setFont("helvetica","bold");
      doc.setFontSize(5.5);
      setTxt("#FFFFFF");
      doc.text(priority,M+16,y+5.5,{align:"center"});

      // Ref et label
      doc.setFont("helvetica","bold");
      doc.setFontSize(8);
      setTxt("#1E293B");
      doc.text(`${a.item.id} — ${a.item.label}`,M+32,y+4.5);

      // Métriques
      doc.setFont("helvetica","normal");
      doc.setFontSize(7);
      setTxt("#64748B");
      const metricsStr=`${zoneLabel}   ·   Biais: ${a.biasPct>0?"+":""}${a.biasPct}%   ·   TS: ${a.ts} /±${a.thresh}   ·   ${a.direction}`;
      doc.text(metricsStr,M+32,y+7.5);

      // Client à droite
      const cl=CLIENTS.find(c=>c.id===a.item.cli)||{label:a.item.cli};
      doc.setFont("helvetica","bold");
      doc.setFontSize(7);
      setTxt(zoneColor);
      doc.text(cl.label,W-M,y+5.5,{align:"right"});

      y+=11;
    });

    if(alerts.filter(a=>a.type==="drift").length>4){
      doc.setFont("helvetica","italic");
      doc.setFontSize(7);
      setTxt("#94A3B8");
      doc.text(`+ ${alerts.filter(a=>a.type==="drift").length-4} autre(s) alerte(s) — voir le détail dans OPTIPLAN`,M,y);
      y+=6;
    }
    y+=4;
  }else{
    doc.setFont("helvetica","bold");
    doc.setFontSize(9);
    setTxt("#0B1F3A");
    doc.text("ALERTES",M,y);
    setDraw("#0B1F3A");
    doc.setLineWidth(0.5);
    doc.line(M,y+1,W-M,y+1);
    y+=8;
    setFill("#F0FDF4");
    doc.roundedRect(M,y,CW,8,1,1,"F");
    doc.setFont("helvetica","bold");
    doc.setFontSize(8);
    setTxt("#10B981");
    doc.text("✓  Aucune alerte — tous les programmes sont stables",M+4,y+5);
    y+=14;
  }

  // ── TABLEAU MÉTRIQUES ─────────────────────────────────
  doc.setFont("helvetica","bold");
  doc.setFontSize(9);
  setTxt("#0B1F3A");
  doc.text("DÉTAIL PAR RÉFÉRENCE — BIAIS & TRACKING SIGNAL",M,y);
  setDraw("#0B1F3A");
  doc.setLineWidth(0.5);
  doc.line(M,y+1,W-M,y+1);
  y+=6;

  // En-tête tableau
  const cols=[
    {h:"Référence",  w:22},
    {h:"Désignation",w:50},
    {h:"Client T1",  w:28},
    {h:"Biais Figé", w:18},
    {h:"TS Figé",    w:16},
    {h:"Biais S-F",  w:18},
    {h:"Biais Flex", w:18},
    {h:"Dernière réc.",w:20},
    {h:"Statut",     w:CW-22-50-28-18-16-18-18-20},
  ];

  setFill("#0B1F3A");
  doc.rect(M,y,CW,7,"F");
  doc.setFont("helvetica","bold");
  doc.setFontSize(6.5);
  setTxt("#FFFFFF");
  let cx=M;
  cols.forEach(c=>{
    doc.text(c.h.toUpperCase(),cx+1,y+4.5);
    cx+=c.w;
  });
  y+=7;

  // Lignes données
  ITEMS.forEach((it,idx)=>{
    const cfg=CFG[it.cli]||DEFAULT_CFG;
    const m=calcMetrics(EDI_DATA[it.id],cfg);
    const cl=CLIENTS.find(c=>c.id===it.cli)||{label:it.cli};
    const recs=EDI_DATA[it.id]||[];
    const lastId=recs.length?recs[recs.length-1].id:"—";
    const flag=m&&Object.values(m).some(v=>v.flag);
    const rowH=6.5;

    // Fond ligne
    if(flag){
      setFill("#FFF5F5");
    }else{
      setFill(idx%2===0?"#FFFFFF":"#F8FAFC");
    }
    doc.rect(M,y,CW,rowH,"F");

    // Bordure gauche rouge si alerte
    if(flag){
      setFill("#EF4444");
      doc.rect(M,y,1.5,rowH,"F");
    }

    doc.setFontSize(7);
    cx=M;

    // Référence
    doc.setFont("helvetica","bold");
    setTxt("#1A4A8A");
    doc.text(it.id,cx+1,y+4.5);
    cx+=cols[0].w;

    // Désignation
    doc.setFont("helvetica","normal");
    setTxt("#1E293B");
    const labelTrunc=it.label.length>28?it.label.slice(0,27)+"…":it.label;
    doc.text(labelTrunc,cx+1,y+4.5);
    cx+=cols[1].w;

    // Client
    const clColor=cl.color||"#64748B";
    setTxt(clColor);
    doc.setFont("helvetica","bold");
    doc.text(cl.label,cx+1,y+4.5);
    cx+=cols[2].w;

    if(!m){
      setTxt("#94A3B8");
      doc.setFont("helvetica","italic");
      doc.text("< 2 réceptions",cx+1,y+4.5);
    }else{
      // Biais Figé
      setTxt(m.frozen.flag?"#EF4444":"#10B981");
      doc.setFont("helvetica","bold");
      doc.text(`${m.frozen.biasPct>0?"+":""}${m.frozen.biasPct}%`,cx+1,y+4.5);
      cx+=cols[3].w;
      // TS Figé
      setTxt(m.frozen.tsFlag?"#EF4444":"#10B981");
      doc.text(`${m.frozen.ts}`,cx+1,y+4.5);
      cx+=cols[4].w;
      // Biais Semi-figé
      setTxt(m.slushy.flag?"#EF4444":"#64748B");
      doc.setFont("helvetica","normal");
      doc.text(`${m.slushy.biasPct>0?"+":""}${m.slushy.biasPct}%`,cx+1,y+4.5);
      cx+=cols[5].w;
      // Biais Flexible
      setTxt(m.liquid.flag?"#EF4444":"#64748B");
      doc.text(`${m.liquid.biasPct>0?"+":""}${m.liquid.biasPct}%`,cx+1,y+4.5);
      cx+=cols[6].w;
      // Dernière réception
      setTxt("#64748B");
      doc.text(lastId,cx+1,y+4.5);
      cx+=cols[7].w;
      // Statut badge
      if(flag){
        setFill("#FEE2E2");
        doc.roundedRect(cx+1,y+1.5,14,4,1,1,"F");
        doc.setFont("helvetica","bold");
        doc.setFontSize(6);
        setTxt("#991B1B");
        doc.text("ALERTE",cx+8,y+4.5,{align:"center"});
      }else{
        setFill("#D1FAE5");
        doc.roundedRect(cx+1,y+1.5,10,4,1,1,"F");
        doc.setFont("helvetica","bold");
        doc.setFontSize(6);
        setTxt("#065F46");
        doc.text("OK",cx+6,y+4.5,{align:"center"});
      }
    }

    // Ligne séparatrice
    setDraw("#F1F5F9");
    doc.setLineWidth(0.2);
    doc.line(M,y+rowH,W-M,y+rowH);
    y+=rowH;
  });

  // ── FOOTER ───────────────────────────────────────────
  const footerY=H-8;
  setDraw("#E2E8F0");
  doc.setLineWidth(0.3);
  doc.line(M,footerY,W-M,footerY);
  doc.setFont("helvetica","normal");
  doc.setFontSize(7);
  setTxt("#94A3B8");
  doc.text("OPTIPLAN — Demand Governance v0.5 · EGBS © 2024 · Confidentiel",M,footerY+4);
  doc.text(`Généré le ${new Date().toLocaleString("fr-FR")}`,W-M,footerY+4,{align:"right"});

  // ── SAUVEGARDE ────────────────────────────────────────
  doc.save(`OPTIPLAN_Rapport_EDI_${dateFile}.pdf`);
  showToast("PDF téléchargé","ti-circle-check");
}

render();

loadFromGAS();
